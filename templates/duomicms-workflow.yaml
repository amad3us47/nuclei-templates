# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: duomicms-workflow

info:
  name: DuomiCMS Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all DuomiCMS related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: duomicms
        subtemplates:
          - tags: duomicms
