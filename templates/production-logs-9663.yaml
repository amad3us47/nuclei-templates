# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: production-logs
info:
  name: Discover production log files
  author: geeknik
  severity: info
  tags: exposure,logs,rails
http:
  - method: GET
    path:
      - "{{BaseURL}}/log/production.log"
      - "{{BaseURL}}/logs/production.log"
      - "{{BaseURL}}/production.log"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Connecting to database specified by database.yml"
          - "Started GET"
        condition: and
      - type: status
        status:
          - 200
      - type: word
        part: header
        words:
          - "text/html"
