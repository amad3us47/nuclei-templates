# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: herokuapp-detect

info:
  name: Detect websites using Herokuapp endpoints
  author: alifathi-h1
  severity: info
  tags: heroku,tech
  description: Detected endpoints might be vulnerable to subdomain takeover or disclose sensitive info

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    extractors:
      - type: regex
        part: body
        regex:
          - "[a-z0-9.-]+\\.herokuapp\\.com"
