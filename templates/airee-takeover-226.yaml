# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: airee-takeover
info:
  name: Airee Takeover Detection
  author: pdcommunity
  severity: high
  tags: takeover
  reference: https://github.com/EdOverflow/can-i-take-over-xyz
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        name: airee
        words:
          - 'Ошибка 402. Сервис Айри.рф не оплачен'
