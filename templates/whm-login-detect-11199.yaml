# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: whm-login-detect
info:
  name: WHM Login Detect
  author: pussycat0x
  severity: info
  reference: https://www.exploit-db.com/ghdb/7128
  tags: whm,panel,login
http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<title>WHM Login</title>"
      - type: status
        status:
          - 200
