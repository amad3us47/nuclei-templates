# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: rack-mini-profiler
info:
  name: rack-mini-profiler environmnet information discloure
  author: vzamanillo
  severity: high
http:
  - method: GET
    path:
      - "{{BaseURL}}/?pp=env"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Rack Environment"
      - type: status
        status:
          - 200
