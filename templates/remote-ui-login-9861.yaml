# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: remote-ui-login
info:
  name: Remote UI Login
  author: dhiyaneshDK
  severity: info
  reference:
    - https://www.exploit-db.com/ghdb/6815
  tags: panel
http:
  - method: GET
    path:
      - '{{BaseURL}}/login.html'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<th>System Manager ID:</th>'
      - type: status
        status:
          - 200
