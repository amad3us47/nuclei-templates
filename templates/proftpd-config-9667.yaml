# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: proftpd-config
info:
  name: ProFTPD Config file disclosure
  author: sheikhrishad
  severity: low
  tags: config,exposure,proftpd
http:
  - method: GET
    path:
      - "{{BaseURL}}/proftpd.conf"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "ProFTPD"
          - "ServerName"
        condition: and
      - type: status
        status:
          - 200
