# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: flowci-detection

info:
  name: FlowCI Detection
  author: Adam Crosser
  severity: info
  tags: panel

http:
  - method: GET
    path:
      - '{{BaseURL}}/'
    redirects: true

    matchers:
      - type: word
        words:
          - '<title>flow-web-x'
