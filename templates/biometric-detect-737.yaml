# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: biometric-detect

info:
  name: Biometric or Fingerprint detect
  author: gaurang
  severity: info
  tags: android,file

file:
  - extensions:
      - all

    matchers:
      - type: word
        words:
          - "android.permission.USE_FINGERPRINT"
          - "android.permission.USE_BIOMETRIC"
