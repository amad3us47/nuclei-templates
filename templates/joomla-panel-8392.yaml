# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: joomla-panel
info:
  name: Joomla Panel
  author: github.com/its0x08
  severity: info
  tags: panel
http:
  - method: GET
    path:
      - "{{BaseURL}}/administrator/"
    matchers:
      - type: word
        words:
          - '<meta name="generator" content="Joomla! - Open Source Content Management" />'
          - '/administrator/templates/isis/images/joomla.png'
        condition: or
