# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: voipmonitor-detect
info:
  name: VoipMonitor detect
  author: Yanyun
  severity: info
  tags: tech,voipmonitor
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - 'share.voipmonitor.org'
          - 'VoIPmonitor'
        condition: and
