# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sendgrid-api-key

info:
  name: Sendgrid API Key
  author: gaurang
  severity: high

file:
  - extensions:
      - all

    extractors:
      - type: regex
        regex:
          - "SG\\.[a-zA-Z0-9]{22}\\.[a-zA-Z0-9]{43}"
