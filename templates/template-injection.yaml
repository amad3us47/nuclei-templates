# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
# info to search signature
id: template-injection-01
info:
  name: Template Injection
  author: unknown
  severity: info

# origin: gonna come from Burp
payloads:
    - '${3*313373133731337}'
    - '${{"{{"}}3*313373133731337{{"}}"}}'
    - '<%= 3 * 313373133731337 %>'
    - '#{ 3 * 313373133731337 }'

http:
  - generators:
      - Query("{{.payload}}")
      - Body("{{.payload}}")
      - Path("{{.payload}}", "*")
      - Cookie("{{.payload}}", "*")
    # if response have result of template code above
