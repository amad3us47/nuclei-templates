# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sap-web-dispatcher-detection
info:
  name: SAP Web Dispatcher detection
  author: randomstr1ng
  description: Detection of SAP Web Dispatcher service
  severity: info
  tags: sap,webserver,proxy
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        GET /inormalydonotexist HTTP/1.1
        Host: {{Subdomains}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0
        Accept-Encoding: gzip, deflate
        Accept: */*
    matchers:
      - type: word
        part: body
        words:
          - "This error page was generated by SAP Web Dispatcher"
