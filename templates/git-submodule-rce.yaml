# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: git-submodule-rce
info:
  name: Git Submodule Remote Code Execution (RCE)
  author: unknown
  severity: high
  description: Detects potential Git submodule RCE vulnerabilities in the target
author: YourName
tags:
  - web
  - git
http:
- method: GET
  path:
    - "/repository"
    - "/checkout?submodule=malicious-repo"
  matchers:
  - type: regex
    part: body
    regex:
    - "RCE executed successfully"
