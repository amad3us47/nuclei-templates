# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: heroku-takeover
info:
  name: heroku takeover detection
  author: 0xPrial,pdteam
  severity: high
  reference:
    - https://github.com/EdOverflow/can-i-take-over-xyz
  tags: takeover,heroku
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - "herokucdn.com/error-pages/no-such-app.html"
          - "<title>No such app</title>"
        condition: and
