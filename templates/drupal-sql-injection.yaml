# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: drupal-sql-injection
info:
  name: Drupalgeddon SQL Injection
  author: unknown
  severity: high
  description: Detects potential Drupalgeddon SQL injection vulnerabilities in the target
author: qaisar afridi
tags:
  - web
  - drupal
http:
- method: POST
  path:
    - "/node"
    - "/update"
  matchers:
  - type: regex
    part: body
    regex:
    - "Update successful"
