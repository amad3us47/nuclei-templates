# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: dahua-workflow

info:
  name: Dahua Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Dahua related nuclei templates on a given target.
workflows:
  - template: http/technologies/favicon-detect.yaml
    matchers:
      - name: dahua
        subtemplates:
          - tags: dahua
