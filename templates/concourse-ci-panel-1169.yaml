# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: concourse-ci-panel

info:
  name: Concourse CI Panel
  author: praetorian-thendrickson
  severity: info
  reference: https://www.shodan.io/search?query=title%3A%22Concourse%22
  tags: panel

http:
  - method: GET
    path:
      - '{{BaseURL}}'
    redirects: true

    matchers:
      - type: word
        words:
          - '<title>Concourse</title>'
