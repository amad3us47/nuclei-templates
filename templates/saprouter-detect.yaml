# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: saprouter-detect

info:
  name: SAPRouter Detection
  author: randomstr1ng
  severity: info
  tags: network,sap

tcp:
  - inputs:
      - data: 57484f415245594f553f0a
        type: hex

    host:
      - "{{Hostname}}"
      - "{{Hostname}}:3299"
    read-size: 1024

    matchers:
      - type: word
        words:
          - "SAProuter"
