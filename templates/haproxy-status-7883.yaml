# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: haproxy-status
info:
  name: HA Proxy Statistics
  author: dhiyaneshDK
  severity: medium
  reference: https://www.exploit-db.com/ghdb/4191
  tags: logs,haproxy
http:
  - method: GET
    path:
      - "{{BaseURL}}/haproxy-status"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Statistics Report for HAProxy'
      - type: status
        status:
          - 200
