# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: nessus-detect

info:
  name: Nessus Detection
  author: milo2012
  severity: info
  description: Detect version of Nessus
  tags: tech,nessus

http:
  - method: GET
    path:
      - "{{BaseURL}}/nessus6.js"

    matchers-condition: or
    matchers:
      - type: word
        part: header
        words:
          - 'NessusWWW'

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - 'this.frontend="(.*)",this'
