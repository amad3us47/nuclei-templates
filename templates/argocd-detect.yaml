# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: argocd-detect

info:
  name: Argo CD Detect
  author: Adam Crosser
  severity: info
  description: Detects the Argo CD website console
  tags: tech,argocd

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: word
        part: body
        words:
          - '<title>Argo CD'
