# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: shoutcast-server
info:
  name: SHOUTcast Server
  author: dhiyaneshDk
  severity: info
  metadata:
    shodan-query: 'http.title:"SHOUTcast Server"'
  tags: panel
http:
  - method: GET
    path:
      - "{{BaseURL}}/index.html"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>SHOUTcast Server</title>"
      - type: status
        status:
          - 200
