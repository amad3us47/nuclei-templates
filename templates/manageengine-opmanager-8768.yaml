# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: manageengine-opmanager
info:
  name: ZOHO ManageEngine OpManager
  author: dhiyaneshDK
  severity: info
  reference: https://www.shodan.io/search?query=http.title%3A%22OpManager+Plus%22
  tags: panel,zoho,manageengine
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<h2>OpManager Plus<span>'
      - type: status
        status:
          - 200
