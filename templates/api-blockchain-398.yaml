# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: api-blockchain

info:
  name: Blockhain API Test
  author: daffainfo
  severity: info
  reference:
    - https://api.blockchain.com/v3/#/
    - https://github.com/daffainfo/all-about-apikey/blob/main/Cryptocurrency/Blockchain.md
  tags: token-spray,blockchain

self-contained: true
http:
  - raw:
      - |
        GET https://api.blockchain.com/v3/exchange/accounts HTTP/1.1
        Host: api.blockchain.com
        X-API-Token: {{token}}

    matchers:
      - type: word
        part: body
        words:
          - '"currency"'
          - '"balance"'
          - '"available"'
        condition: and
