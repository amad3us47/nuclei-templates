# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: x-forwarded-host

info:
  name: x-forwarded-host
  author: Kabilan S
  severity: low

http:
  - method: GET
    # Example of sending some headers to the servers
    headers:

      X-Forwarded-Host: "evil.com"
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        words:
          - "evil"
