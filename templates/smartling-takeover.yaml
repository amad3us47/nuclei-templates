# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: smartling-takeover

info:
  name: smartling takeover detection
  author: pdcommunity
  severity: info
  tags: takeover
  reference: https://github.com/EdOverflow/can-i-take-over-xyz/issues/67

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - Domain is not configured
