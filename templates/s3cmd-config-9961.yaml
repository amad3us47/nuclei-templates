# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: s3cmd-config
info:
  name: S3CMD Configuration Disclosure
  author: Ice3man
  severity: info
  tags: amazon,config,exposure
http:
  - method: GET
    path:
      - "{{BaseURL}}/s3cmd.ini"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '[default]'
          - 'access_key'
        condition: and
      - type: status
        status:
          - 200
