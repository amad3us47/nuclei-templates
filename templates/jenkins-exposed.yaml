# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: jenkins-exposed
info:
  id: jenkins-exposed
  name: Jenkins Exposed - Detect
  author: OpenAI
  description: Template to detect exposed Jenkins instances
  severity: high
  classification:
    country: any
    tags:
      - jenkins
      - security
      - exposed

matcher-condition: or

http:
    method: GET
    path:
      - "/jenkins/*"
    description: Attempt to access Jenkins installation
    condition: or

matchers:
  - pattern: "Jenkins"
    type: body
    description: Jenkins banner found in response body

response:
  - status:
      - 200
    description: Successful response status
