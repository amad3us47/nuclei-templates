# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: yapi-workflow

info:
  name: YApi Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all YApi related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: yapi
        subtemplates:
          - tags: yapi
