# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: dir-listing

info:
  name: Directory listing enabled
  author: _harleo
  severity: info

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        words:
          - "Index of /"
          - "[To Parent Directory]"
