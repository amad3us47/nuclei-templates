# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: linkedin-client-id

info:
  name: Linkedin Client ID
  author: gaurang
  severity: low

file:
  - extensions:
      - all

    extractors:
      - type: regex
        regex:
          - "(?i)linkedin(.{0,20})?(?-i)[0-9a-z]{12}"
