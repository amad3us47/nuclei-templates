# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: clientaccesspolicy

info:
  name: Silverlight cross-domain policy
  author: emadshanab
  severity: info
  tags: misc

http:
  - method: GET
    path:
      - "{{BaseURL}}/clientaccesspolicy.xml"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<access-policy>"
          - "<cross-domain-access>"
          - "domain uri="
        condition: and

      - type: status
        status:
          - 200
