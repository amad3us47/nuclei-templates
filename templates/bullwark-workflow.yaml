# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: bullwark-workflow

info:
  name: Bullwark Momentum Series Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Bullwark Momentum Series related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: bullwark
        subtemplates:
          - tags: bullwark
