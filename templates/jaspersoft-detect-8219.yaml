# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: jaspersoft-detect
info:
  name: Jaspersoft detected
  author: koti2
  severity: info
  tags: tech,jaspersoft
http:
  - method: GET
    path:
      - "{{BaseURL}}/jasperserver/login.html?error=1"
    matchers:
      - type: word
        words:
          - "TIBCO Jaspersoft: Login"
          - "Could not login to JasperReports Server"
          - "About TIBCO JasperReports Server"
        condition: or
