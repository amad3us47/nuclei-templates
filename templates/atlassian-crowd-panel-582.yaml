# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: atlassian-crowd-panel

info:
  name: Atlassian Crowd panel detect
  author: organiccrap
  severity: info
  tags: panel

http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100

    raw:
      - |
        GET /crowd/console/login.action HTTP/1.1
        Host: {{Subdomains}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - <title>Atlassian Crowd - Login</title>
        part: body
