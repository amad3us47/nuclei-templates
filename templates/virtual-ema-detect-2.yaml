# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: virtual-ema-detect2

info:
  name: Virtual EMS Panel Detection
  author: iamthefrogy
  severity: info
  tags: panel


http:
  - raw:
      - |
        GET /VirtualEms/Login.aspx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_4) AppleWebKit/537.36 (KHTML, like Gecko)
    matchers:
      - type: word
        words:
          - "Login"
          - "Browse"
          - "Welcome Guest"
        condition: and
