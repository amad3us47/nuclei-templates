# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: workspace-one-uem
info:
  name: Workspace ONE UEM AirWatch Login Page
  author: gevakun
  severity: info
  reference: https://twitter.com/Jhaddix/status/1295861505963909120
  tags: panel
http:
  - method: GET
    path:
      - "{{BaseURL}}/AirWatch/Login"
    matchers:
      - type: word
        words:
          - "About VMware AirWatch"
        part: body
