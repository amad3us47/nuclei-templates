# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: axigen-webadmin

info:
  name: Axigen Web Admin
  author: dhiyaneshDk
  severity: info
  metadata:
    shodan-query: 'http.title:"Axigen&nbsp;WebAdmin"'
  tags: axigen,panel

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Axigen&nbsp;WebAdmin</title>'

      - type: status
        status:
          - 200
