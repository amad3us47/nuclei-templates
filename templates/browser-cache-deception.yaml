# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: browser-cache-deception
info:
  name: Browser Cache Deception
  author: unknown
  severity: medium
  description: Detects potential cache deception vulnerabilities in the target
author: qaisar afridi
tags:
  - web
  - cache-deception
http:
- method: GET
  path:
    - "/resource"
    - "/deceive-cache"
  matchers:
  - type: regex
    part: body
    regex:
    - "Cache-Control: public"
    - "Expires:.*"
