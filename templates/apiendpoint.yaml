# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: weak-password-policy
info:
  name: Weak Password Policy
  author: unknown
  severity: medium
  description: Detects weak password policies in the target
author: qaisar afridi
tags:
  - web
  - password-policy
http:
- method: POST
  path:
    - "/change-password"
    - "/update-policy"
  matchers:
  - type: regex
    part: body
    regex:
    - "Password must be at least 8 characters"
