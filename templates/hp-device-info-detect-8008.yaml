# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: hp-device-info-detect
info:
  name: HP LaserJet
  author: pussycat0x
  severity: low
  reference: https://www.exploit-db.com/ghdb/6905
  tags: iot,hp
http:
  - method: GET
    path:
      - "{{BaseURL}}/hp/device/DeviceInformation/View"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Device Information"
          - "hp"
        condition: and
      - type: status
        status:
          - 200
