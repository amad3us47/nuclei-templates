# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: freshdesk-takeover
info:
  name: freshdesk takeover detection
  author: naglinagli
  severity: high
  tags: takeover
  reference: https://twitter.com/ja1sharma/status/1377239265348743175
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'There is no helpdesk here!'
          - 'May be this is still fresh!'
          - 'freshdesk.com/signup'
        condition: and
      - type: dsl
        dsl:
          - '!contains(host,"freshpo.com")'
