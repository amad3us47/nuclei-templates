# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: custom-logapi-log-detect

info:
        name: Custom-logapi-log-detect
        author: 0xunknown
        severity: low
        tags: panel

http:
        - method: GET
          path:
                  - "{{BaseURL}}/logapi/log"
          matchers:
                  - type: word
                    words:
                            - "Import Succeeded"
