# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: config-json-exposure-fuzz

info:
  name: Exposed JSON Configuration Files
  author: geeknik
  severity: critical
  description: |
    Detects exposed JSON configuration files containing sensitive information including API keys, access tokens, AWS credentials, database configurations, base URLs, file paths, and application settings. These files often contain production configurations and credentials that should not be publicly accessible.
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:H
    cvss-score: 10.0
    cwe-id: CWE-552
  metadata:
    max-request: 50
    github-query: filename:config.json
  tags: config,exposure,files,vuln

http:
  - method: GET
    path:
      - "{{BaseURL}}{{path}}"

    payloads:
      path:
        # Root level configs
        - /config.json
        - /configuration.json
        - /settings.json
        - /configs.json
        - /conf.json
        - /app.config.json
        - /application.json
        # Environment specific configs
        - /config.prod.json
        - /config.production.json
        - /config.dev.json
        - /config.development.json
        - /config.staging.json
        - /config.test.json
        - /config.local.json
        # Common config paths
        - /config/config.json
        - /config/default.json
        - /config/prod.json
        - /config/production.json
        - /config/development.json
        - /config/app.json
        # Application specific paths
        - /app/config.json
        - /src/config.json
        - /assets/config.json
        - /assets/config.production.json
        - /assets/configs.json
        - /static/config.json
        - /public/config.json
        - /dist/config.json
        - /js/config.json
        # API configs
        - /api/config.json
        - /api/v1/config.json
        - /api/v2/config.json
        - /apiconfig.json
        # Framework specific
        - /angular/config.json
        - /react/config.json
        - /vue/config.json
        # Credentials & secrets
        - /credentials/config.json
        - /secrets/config.json
        - /secret/config.json
        - /keys/config.json
        - /auth/config.json
        # AWS related
        - /aws/config.json
        - /aws/credentials.json
        - /cloud/config.json
        - /s3/config.json
        # Database configs
        - /db/config.json
        - /database/config.json
        - /mysql/config.json
        - /postgres/config.json
        - /mongodb/config.json

    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "application/json"
          - "text/json"
          - "text/plain"
        condition: or

      - type: word
        part: header
        words:
          - "text/html"
          - "text/php"
        condition: or

