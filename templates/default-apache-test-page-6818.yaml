# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: default-apache-test-page
info:
  name: Apache HTTP Server Test Page
  author: dhiyaneshDk
  severity: info
  metadata:
    shodan-query: http.title:"Apache HTTP Server Test Page powered by CentOS"
  tags: tech,apache
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers:
      - type: word
        words:
          - "<title>Apache HTTP Server Test Page powered by CentOS</title>"
        part: body
