id: cors-00
info:
  name: CORS Misconfiguration
  author: unknown
  severity: info

payloads:
    - 'http://example.com'
    - 'example.com'

http:
  - generators:
      - Header("{{.payload}}", "Referer")
      - Header("{{.payload}}", "Origin")
