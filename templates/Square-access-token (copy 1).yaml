# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: square-access-token

info:
  name: Square Accesss Token
  author: gaurang
  severity: high

file:
  - extensions:
      - all

    extractors:
      - type: regex
        regex:
          - "sq0atp-[0-9A-Za-z\\-_]{22}"
