# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: cloudinary-basic-auth
info:
  name: Cloudinary Basic Auth
  author: gaurang
  severity: high
file:
  - extensions:
      - all
    extractors:
      - type: regex
        regex:
          - "cloudinary://[0-9]{15}:[0-9A-Za-z\\-_]+@[0-9A-Za-z\\-_]+"
