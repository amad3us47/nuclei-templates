# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: h3c-imc-workflow

info:
  name: H3c IMC Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all H3c IMC related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: h3c-imc
        subtemplates:
          - tags: h3c-imc
