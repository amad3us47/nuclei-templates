# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: Joomla_version

info:
  name: Detect joomla version
  author: Kien Nguyen
  severity: info
  tags: joomla,info,tech

http:
  - method: GET
    path:
      - '{{BaseURL}}/language/en-GB/en-GB.xml'
      - '{{BaseURL}}/modules/custom.xml'
      - '{{BaseURL}}/administrator/manifests/files/joomla.xml'

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: header
        words:
          - "Content-Type: application/xml"

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '<version>(.*?)</version>'
