# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: jenkins-login
info:
  name: Jenkins Login
  author: pdteam
  severity: info
  tags: panel,jenkins
http:
  - method: GET
    path:
      - '{{BaseURL}}/login'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Sign in [Jenkins]'
      - type: status
        status:
          - 200
