# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: b2evolution-workflow

info:
  name: b2evolution CMS Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all b2evolution CMS related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: b2evolution
        subtemplates:
          - tags: b2evolution
