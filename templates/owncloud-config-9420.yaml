# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: owncloud-config
info:
  name: owncloud config Disclosure
  author: Mahendra Purbia (Mah3Sec_)
  severity: info
  tags: config,exposure
http:
  - method: GET
    path:
      - "{{BaseURL}}/owncloud/config/"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Index of'
          - 'owncloud/config'
        condition: and
        part: body
      - type: status
        status:
          - 200
