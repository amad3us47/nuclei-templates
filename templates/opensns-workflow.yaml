# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: opensns-workflow

info:
  name: OpenSNS Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all OpenSNS related nuclei templates on a given target.
workflows:
  - template: http/technologies/favicon-detect.yaml
    matchers:
      - name: opensns
        subtemplates:
          - tags: opensns
