# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: dedecms-workflow

info:
  name: DedeCMS Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all DedeCMS related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: dedecms
        subtemplates:
          - tags: dedecms
