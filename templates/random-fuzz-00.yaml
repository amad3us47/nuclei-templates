# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: random-fuzz-00
info:
  name: Random Fuzz on Header Basic
  author: unknown
  severity: info

params:
  - length: '1000'

origin:
  method: GET

variables:
  - head: File("{{.Resources}}/lite-headers.txt")

payloads:
  - >-
    '
  - >-
    -
  - >-
    %
  - >-
    \"
  - >-
    `
  - >-
    %00
  - >-
    ..;
  - >-
    ..
  - >-
    %00
  - >-
    %0A
  - >-
    %0D
  - >-
    %ff
  - >-
    °
  - >-
    /////////

http:
  - generators:
      - Header("{{.payload}}", "{{.head}}")
