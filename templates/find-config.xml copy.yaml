# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: Configuration-displayed
info:
  name: Finds config for
  author: Clark
  severity: medium

http:
  - method: GET
    path:
      - "{{BaseURL}}/CaseManager/welcome/displayCmisConfig.jsp"

    matchers-condition: and
    matchers:

      - type: word
        words:
          - appSettings

      - type: status
        status:
          - 200
