# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: mobileiron-login
info:
  name: MobileIron Login
  author: dhiyaneshDK & @dwisiswant0
  severity: info
  Severity: info
  tags: panel
http:
  - method: GET
    path:
      - "{{BaseURL}}/mifs/login.jsp"
      - "{{BaseURL}}/mifs/user/login.jsp"
      - "{{BaseURL}}/mifs/c/d/android.html"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "MobileIron Admin Portal"
          - "MobileIron User Portal"
          - "MobileIron Registration"
          - "Mobilizing enterprise applications"
      - type: status
        status:
          - 200
