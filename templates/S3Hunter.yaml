# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: s3-hunter

info:
  name: Hunts for unreferenced AWS S3 Buckets
  author: glatisant
  severity: medium
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers:
      - type: word
        words:
          - 'ListBucketResult'
