# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: manageengine-adselfservice

info:
  name: ZOHO ManageEngine ADSelfService Plus
  author: dhiyaneshDK
  severity: info
  metadata:
    shodan-query: http.title:"ADSelfService Plus"
  tags: panel,zoho,manageengine

http:
  - method: GET
    path:
      - '{{BaseURL}}/authorization.do'

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>ADSelfService Plus</title>'

      - type: status
        status:
          - 200
