# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: rails-routes-exposure

info:
  name: Rails Routes Exposure
  author: shelled
  severity: medium
  tags: rails,exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/rails/info/routes"

    matchers:
      - type: word
        part: body
        words:
          - 'Routes match in priority from top to bottom'
