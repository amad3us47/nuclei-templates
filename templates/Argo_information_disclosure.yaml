# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: Argo-Information-Disclosure

info:
  name: Argo information disclosure
  author: Excis3
  severity: high
  description: Disclosure of argo database information.
  tags: argo

http:
  - method: GET
    path:
      - "{{BaseURL}}/WEB-INF/classes/argo.properties"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "argo.database"

      - type: status
        status:
          - 200
