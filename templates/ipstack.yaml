# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: api-ipstack

info:
  name: IPStack API Test
  author: zzeitlin
  reference: https://ipstack.com/documentation
  severity: info
  tags: token-spray,ipstack

http:
  - method: GET
    path:
      - "https://api.ipstack.com/8.8.8.8?access_key={{token}}"

    matchers:
      - type: word
        part: body
