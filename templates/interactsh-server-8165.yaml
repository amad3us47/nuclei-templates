# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: interactsh-server
info:
  name: Interactsh Server
  author: pdteam
  severity: info
  tags: tech,interactsh
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - "<h1> Interactsh Server </h1>"
    extractors:
      - type: regex
        group: 1
        regex:
          - '<b>(.*)<\/b> server'
          - 'from <b>(.*)<\/b>'
