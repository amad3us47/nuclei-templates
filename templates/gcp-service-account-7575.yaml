# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: gcp-service-account

info:
  name: Google (GCP) Service-account
  author: gaurang
  severity: low
  tags: token,file,google

file:
  - extensions:
      - all

    extractors:
      - type: regex
        regex:
          - "\"type\": \"service_account\""
