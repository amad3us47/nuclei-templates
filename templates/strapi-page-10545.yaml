# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: strapi-page
info:
  name: Strapi Page
  author: dhiyaneshDk
  severity: info
  metadata:
    shodan-query: http.title:"Welcome to your Strapi app"
  tags: api,strapi
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers:
      - type: word
        words:
          - '<title>Welcome to your Strapi app</title>'
        condition: and
