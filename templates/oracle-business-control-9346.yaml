# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: oracle-business-control
info:
  name: Oracle Commerce Business Control Center
  author: dhiyaneshDk
  severity: info
  reference:
    - https://www.shodan.io/search?query=http.title%3A%22Oracle+Commerce%22
  tags: oracle,login,panel
http:
  - method: GET
    path:
      - '{{BaseURL}}/atg/bcc'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Oracle Commerce Business Control Center</title>'
      - type: status
        status:
          - 200
