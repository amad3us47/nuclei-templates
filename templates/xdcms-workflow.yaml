# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: xdcms-workflow

info:
  name: XdCMS Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all XdCMS related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: xdcms
        subtemplates:
          - tags: xdcms
