# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: basic-raw-query-example

info:
  name: Test RAW GET Query Template
  author: pdteam
  severity: info

http:
  - raw:
      - |
        GET ?test=nuclei HTTP/1.1
        Host: {{Hostname}}
        Origin: {{BaseURL}}

    matchers:
      - type: word
        words:
          - "Test is test raw-get-query-matcher text"
