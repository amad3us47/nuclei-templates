# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: ansible-config-disclosure
info:
  name: Ansible Configuration Exposure
  author: pdteam
  severity: medium
  tags: config,exposure
http:
  - method: GET
    path:
      - '{{BaseURL}}/ansible.cfg'
    matchers:
      - type: word
        words:
          - '[defaults]'
          - '[inventory]'
        condition: and
