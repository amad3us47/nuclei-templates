# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: dotnetnuke-workflow

info:
  name: DotNetNuke Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all DotNetNuke related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: dotnetnuke
        subtemplates:
          - tags: dotnetnuke
