# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: captcha-bypass
info:
  name: CAPTCHA Bypass
  author: unknown
  severity: high
  description: Detects potential vulnerabilities allowing bypass of CAPTCHA on the login page
author: qaisar
tags:
  - web
  - authentication
http:
- method: POST
  path: "/login"
  matchers:
  - type: regex
    part: body
    regex:
    - "CAPTCHA verification failed"
