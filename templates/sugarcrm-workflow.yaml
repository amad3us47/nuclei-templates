# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sugarcrm-workflow

info:
  name: SugarCRM Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all SugarCRM related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: sugarcrm
        subtemplates:
          - tags: sugarcrm
