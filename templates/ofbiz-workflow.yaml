# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: ofbiz-workflow

info:
  name: OFBiz Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all OFBiz related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: apache-ofbiz
        subtemplates:
          - tags: ofbiz
