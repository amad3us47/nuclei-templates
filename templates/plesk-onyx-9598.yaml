# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: plesk-onyx-login
info:
  name: Plesk Onyx login portal
  author: dhiyaneshDK
  severity: info
  reference: https://www.exploit-db.com/ghdb/6501
  tags: panel
http:
  - method: GET
    path:
      - '{{BaseURL}}/login_up.php'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Plesk Onyx'
      - type: status
        status:
          - 200
