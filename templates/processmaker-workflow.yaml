# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: processmaker-workflow

info:
  name: ProcessMaker Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all ProcessMaker related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: processmaker
        subtemplates:
          - tags: processmaker
