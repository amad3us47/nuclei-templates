# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sco-workflow

info:
  name: SCO Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all SCO related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: sco
        subtemplates:
          - tags: sco
