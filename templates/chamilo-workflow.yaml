# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: chamilo-workflow

info:
  name: Chamilo LMS Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Chamilo LMS related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: chamilo
        subtemplates:
          - tags: chamilo
