# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sql-server-reporting
info:
  name: Detect Microsoft SQL Server Reporting
  author: puzzlepeaches
  severity: info
  tags: tech,micrsoft
http:
  - method: GET
    path:
      - "{{BaseURL}}/Reports/Pages/Folder.aspx"
    matchers:
      - type: word
        words:
          - "Report Manager"
