# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: manageengine-apex-helpdesk
info:
  name: ZOHO ManageEngine APEX IT Help-Desk
  author: dhiyaneshDK
  severity: info
  reference: https://www.shodan.io/search?query=http.title%3A%22APEX+IT+Help+Desk%22
  tags: panel,zoho,manageengine
http:
  - method: GET
    path:
      - '{{BaseURL}}/jsp/index.jsp'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>APEX IT Help Desk</title>'
      - type: status
        status:
          - 200
