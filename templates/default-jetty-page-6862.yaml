# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: default-jetty-page

info:
  name: Jetty Default Page
  author: dhiyaneshDk
  severity: info
  tags: tech,jetty
  reference: https://www.shodan.io/search?query=http.title%3A%22Powered+By+Jetty%22

http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers:
      - type: word
        words:
          - "<TITLE>Powered By Jetty</TITLE>"
        part: body
