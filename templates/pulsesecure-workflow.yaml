# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: pulsesecure-workflow

info:
  name: Pulse Connect Secure Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Pulse Connect Secure related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: pulsesecure
        subtemplates:
          - tags: pulsesecure
