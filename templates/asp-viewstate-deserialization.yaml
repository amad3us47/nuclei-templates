# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: asp-viewstate-deserialization
info:
  name: ASP.NET ViewState Deserialization
  author: unknown
  severity: high
  description: Detects potential ASP.NET ViewState deserialization vulnerabilities in the target
author: qaisar afridi
tags:
  - web
  - asp.net
http:
- method: POST
  path:
    - "/viewstate"
    - "/process-data"
  matchers:
  - type: regex
    part: body
    regex:
    - "<input type=\"hidden\" name=\"__VIEWSTATE\" value=\"[^\"]+\" />"
