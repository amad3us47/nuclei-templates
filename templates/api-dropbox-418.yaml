# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: api-dropbox

info:
  name: Dropbox API Test
  author: zzeitlin
  reference: https://www.dropbox.com/developers/documentation/http/documentation
  severity: info
  tags: token-spray,dropbox

self-contained: true
http:
  - method: POST
    path:
      - "https://api.dropboxapi.com/2/users/get_current_account"
    headers:
      Authorization: Bearer {{token}}

    matchers:
      - type: word
        part: body
        words:
          - '"account_id":'
          - '"email":'
        condition: and
