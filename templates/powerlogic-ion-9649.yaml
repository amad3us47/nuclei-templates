# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: powerlogic-ion
info:
  name: PowerLogic ION Exposed
  author: dhiyaneshDK
  severity: low
  reference: https://www.exploit-db.com/ghdb/6810
  tags: panel
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        GET / HTTP/1.1
        Host: {{Subdomains}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_4) AppleWebKit/537.36 (KHTML, like Gecko)
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'PowerLogic ION'
      - type: status
        status:
          - 200
