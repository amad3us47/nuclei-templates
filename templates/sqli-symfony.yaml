# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sqli-symfony

info:
  name: symfony SQLI
  author: ELSFA7110
  severity: high
  tags: sqli

http:
  - method: GET
    path:
      - "{{BaseURL}}/app_dev.php/1'%20%22"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "SQL"
        part: body

      - type: status
        status:
          - 200
