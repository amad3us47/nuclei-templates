# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: websvn-workflow

info:
  name: Websvn Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Websvn related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: websvn
        subtemplates:
          - tags: websvn
