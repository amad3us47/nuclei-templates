# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: ruijie-information-disclosure
info:
  name: Ruijie Information Disclosure
  author: pikpikcu
  severity: high
  reference:
    - https://www.cnblogs.com/cHr1s/p/14499858.html
  tags: ruijie,config,exposure
http:
  - method: GET
    path:
      - '{{BaseURL}}/login.php'
    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - '"role":"super_admin","name":"(.*)","password":"(.*)"'
        part: body
        condition: and
      - type: status
        status:
          - 200
