# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: tongda-workflow

info:
  name: TongDa Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all TongDa related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: tongda
        subtemplates:
          - tags: tongda
