# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sqlcipher-detection

info:
  name: SQL Cipher Detection
  author: Christian Angel
  severity: info

file:
  - extensions:
      - all

    matchers:
      - type: word
        words:
          - "libsqlcipher.so"
