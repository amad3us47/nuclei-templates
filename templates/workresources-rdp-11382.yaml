# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: workresources-rdp
info:
  name: Work Resources RemoteApp and Desktop Connection
  author: dhiyaneshDK
  severity: info
  metadata:
    shodan-query: http.title:"RD Web Access"
  tags: panel,workresources
http:
  - method: GET
    path:
      - '{{BaseURL}}/RDWeb/Pages/en-US/login.aspx'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Error: Unable to display RD Web Access</title>'
      - type: status
        status:
          - 200
