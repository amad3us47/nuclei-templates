# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: dom-based-open-redirect
info:
  name: DOM-Based Open Redirect
  author: unknown
  severity: medium
  description: Detects potential DOM-based open redirect vulnerabilities in the target
author: qaisar afridi
tags:
  - web
  - dom-based
http:
- method: GET
  path:
    - "/redirect"
    - "/navigate?to=http://malicious.com"
  matchers:
  - type: regex
    part: body
    regex:
    - "location\\.href\\s*=\\s*\"http://malicious\\.com\""
