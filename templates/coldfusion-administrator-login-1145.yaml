# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: coldfusion-administrator-login

info:
  name: ColdFusion Administrator Login
  author: dhiyaneshDK
  severity: info
  reference:
    - https://www.shodan.io/search?query=http.title%3A%22ColdFusion+Administrator+Login%22
  metadata:
    shodan-query: http.component:"Adobe ColdFusion"
  tags: panel,coldfusion,adobe

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>ColdFusion Administrator Login</title>'

      - type: status
        status:
          - 200
