# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: symfony-profiler
info:
  name: Symfony Profiler
  author: pdteam
  severity: high
  metadata:
    verified: true
    shodan-query: http.html:"symfony Profiler"
  tags: config,exposure,symfony
http:
  - method: GET
    path:
      - "{{BaseURL}}/_profiler/empty/search/results?limit=10"
      - "{{BaseURL}}/app_dev.php/_profiler/empty/search/results?limit=10"
    stop-at-first-match: true
    matchers:
      - type: word
        part: body
        words:
          - "Symfony Profiler"
