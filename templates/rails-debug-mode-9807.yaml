# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: rails-debug-mode
info:
  name: Rails Debug Mode Enabled
  author: pdteam
  severity: medium
  tags: logs,rails,exposure
http:
  - method: GET
    path:
      - "{{BaseURL}}/1238a92f573a48e58d356c42ca2c9610"
    matchers:
      - type: word
        words:
          - "Rails.root:"
          - "Action Controller: Exception caught"
        condition: and
        part: body
