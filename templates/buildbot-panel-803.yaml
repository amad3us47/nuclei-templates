# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: buildbot-panel

info:
  name: Buildbot Panel Detect
  author: thardt-praetorian
  severity: info
  reference: https://buildbot.net
  metadata:
    shodan-query: http.title:"BuildBot"
  tags: panel,buildbot,cicd

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - '<title(.*)>Buildbot</title>'

      - type: status
        status:
          - 200
