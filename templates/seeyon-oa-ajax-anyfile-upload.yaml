id: seeyon-oa-ajax-anyfile-upload

info:
  name: 致远OA ajax.do 任意文件上传
  author: daffainfo
  severity: critical
  description: |
    致远OA办公自动化软件，用于OA办公自动化软件的开发销售。2010年，用友致远更名为致远协创。2017年更名为致远互联。北京致远互联软件股份有限公司（简称：致远互联）成立于2002年3月，总部设立在北京，是一家集协同办公产品的设计、研发、销售及服务为一体的企业。致远OA系统存在任意文件上传漏洞，攻击者通过漏洞可以上传木马文件，导致服务器失陷。
    fofa-query: app="致远互联-OA"
  reference:
    - https://mp.weixin.qq.com/s/wEFhqu8yjEyb2gGZL_if2A
