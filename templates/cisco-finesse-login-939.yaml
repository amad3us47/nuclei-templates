# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: cisco-finesse-login

info:
  name: Cisco Finesse Login
  author: dhiyaneshDK
  severity: info
  reference: https://www.exploit-db.com/ghdb/6824
  tags: panel,cisco

http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100

    raw:
      - |
        GET /desktop/container/landing.jsp?locale=en_US HTTP/1.1
        Host: {{Subdomains}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title id="page_title">Sign in to Cisco Finesse</title>'
      - type: status
        status:
          - 200
