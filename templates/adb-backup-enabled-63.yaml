# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: adb-backup-enabled

info:
  name: ADB Backup Enabled
  author: gaurang
  severity: low
  tags: android,file

file:
  - extensions:
      - all

    matchers:
      - type: word
        words:
          - "android:allowBackup=\"true\""
