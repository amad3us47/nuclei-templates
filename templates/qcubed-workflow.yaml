# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: qcubed-workflow

info:
  name: Qcubed Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Qcubed related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: qcubed
        subtemplates:
          - tags: qcubed
