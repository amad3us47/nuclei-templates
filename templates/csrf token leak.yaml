# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: csrf-token-leakage
info:
  name: CSRF Token Leakage
  author: unknown
  severity: medium
  description: Detects potential leakage of CSRF tokens in unexpected locations on the target site
author: qaisar
tags:
  - web
  - csrf
http:
- method: GET
  path:
    - "/public"
    - "/user-info"
  matchers:
  - type: regex
    part: body
    regex:
    - "CSRF Token: .*"
