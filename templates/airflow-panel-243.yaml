# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: airflow-panel

info:
  name: Airflow Admin login
  author: pdteam
  severity: info
  tags: panel,apache,airflow

http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100

    raw:
      - |
        GET /admin/airflow/login HTTP/1.1
        Host: {{Subdomains}}
    matchers-condition: and
    matchers:

      - type: word
        part: body
        words:
          - "Airflow - Login"

      - type: status
        status:
          - 200
