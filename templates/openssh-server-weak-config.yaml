# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: openssh-server-weak-config
info:
  id: openssh-server-weak-config
  name: OpenSSH Server Configuration Weakness - Detect
  author: OpenAI
  description: OpenSSH server installations with weak configurations
  severity: high
  classification:
    country: any
    tags:
      - openssh
      - security
      - configuration

  reference:
    - https://www.ssh.com/iam/ssh-key-management/

  requests:
      method: GET
      path:
        - "/.ssh/authorized_keys"
      description: Attempt to retrieve authorized SSH keys

  matchers:
    - pattern: "ssh-rsa"
      type: body
      description: Authorized SSH keys found in the server configuration

  response:
    - status:
        - 200
