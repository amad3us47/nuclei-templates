# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: error-based-sql-injection

info:
  name: Error based SQL injection
  author: geeknik
  severity: critical
  description: A SQL injection vulnerability was identified based on an error message returned by the server.
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
    cwe-id: CWE-89
  metadata:
    max-request: 1
  tags: sqli,generic,error,vuln

http:
  - method: GET
    path:
      - "{{BaseURL}}/'"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Adminer"
        # False Positive
        part: body

