# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: wordpress-plugins-ultimate-member
info:
  name: WordPress Plugin Ultimate Member
  author: pussycat0x
  severity: low
  description: Searches for sensitive directories present in the wordpress-plugins plugin.
  reference: https://www.exploit-db.com/ghdb/6998
  tags: wordpress,listing
http:
  - method: GET
    path:
      - "{{BaseURL}}/wp-content/plugins/ultimate-member/"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Index of"
          - "/wp-content/plugins/ultimate-member/"
        condition: and
      - type: status
        status:
          - 200
