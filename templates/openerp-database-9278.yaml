# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: openerp-database
info:
  name: OpenERP database instances
  author: impramodsargar
  severity: info
  tags: openerp
http:
  - method: GET
    path:
      - "{{BaseURL}}/web/database/selector/"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Odoo</title>'
      - type: status
        status:
          - 200
