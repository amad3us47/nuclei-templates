# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: csp-bypass
info:
  name: CSP Bypass
  author: unknown
  severity: high
  description: Detects potential Content Security Policy (CSP) bypass vulnerabilities in the target
author: qaisar afridi
tags:
  - web
  - csp
http:
- method: GET
  path:
    - "/page"
    - "/view?script=<script>alert('CSP Bypass')</script>"
  matchers:
  - type: regex
    part: body
    regex:
    - "alert\\('CSP Bypass'\\)"
