# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: teradici-pcoip
info:
  name: Teradici PCoIP Detection
  author: pdteam
  severity: info
  tags: tech,pcoip
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        GET /info/ HTTP/1.1
        Host: {{Subdomains}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0
        Accept-Encoding: gzip, deflate
        Accept: */*
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "PCoIP Connection Manager"
    extractors:
      - type: regex
        group: 1
        regex:
          - 'PCoIP Connection Manager\/([0-9.]+)\.'
