# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sidekiq-dashboard
info:
  name: sidekiq-dashboard
  author: dhiyaneshDK
  severity: medium
  reference:
    - https://sidekiq.org
    - https://github.com/mperham/sidekiq
  tags: unauth,panel,sidekiq
http:
  - method: GET
    path:
      - "{{BaseURL}}/sidekiq"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - <title>Sidekiq</title>
        part: body
      - type: status
        status:
          - 200
