# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: jeedom-detect

info:
  name: Jeedom Detect
  author: pikpikcu
  severity: info
  tags: tech,jeedom

http:
  - method: GET
    path:
      - "{{BaseURL}}/index.php?v=d"

    matchers-condition: and
    matchers:

      - type: word
        part: body
        words:
          - "<title>Jeedom</title>"

      - type: status
        status:
          - 200
