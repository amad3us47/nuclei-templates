# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: moodle-workflow

info:
  name: Moodle Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Moodle related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: moodle
        subtemplates:
          - tags: moodle
