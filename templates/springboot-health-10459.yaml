# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: springboot-health
info:
  name: Detect Springboot Health Actuator
  author: pussycat0x
  severity: info
  description: Additional routes may be displayed
  tags: springboot,exposure
http:
  - method: GET
    path:
      - "{{BaseURL}}/health"
      - "{{BaseURL}}/actuator/health"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '"status"'
          - '"diskSpace"'
          - '"jms"'
        condition: and
      - type: status
        status:
          - 200
