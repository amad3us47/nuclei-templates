# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: oipm-detect
info:
  name: One Identity Password Manager detection
  author: nodauf
  severity: info
  tags: panel
http:
  - method: GET
    path:
      - '{{BaseURL}}/PMUser/'
    matchers:
      - type: word
        words:
          - "One Identity Password Manager"
