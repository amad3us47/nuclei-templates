# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: mobotix-guest-camera
info:
  name: MOBOTIX Guest Camera
  author: dhiyaneshDK
  severity: info
  reference: https://www.exploit-db.com/ghdb/6848
  tags: iot
http:
  - method: GET
    path:
      - '{{BaseURL}}/cgi-bin/guestimage.html'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'MOBOTIX'
      - type: status
        status:
          - 200
