# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: apache-dubbo-detect
info:
  name: Apache dubbo detect
  author: ffffffff0x
  severity: info
  metadata:
    fofa-query: app="APACHE-dubbo"
  tags: apache,dubbo,tech

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: word
        part: header
        words:
          - "Basic realm=\"dubbo\""
