# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: aws-bucket-takeover
info:
  name: AWS Bucket Takeover Detection
  author: pdteam,pwnhxl,zy9ard3,venjaku
  severity: high
  description: AWS Bucket takeover was detected.
  reference:
    - https://github.com/EdOverflow/can-i-take-over-xyz/issues/36
  metadata:
    max-request: 1
  tags: takeover,aws,bucket,vuln

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - Host != ip

      - type: word
        words:
          - "The specified bucket does not exist"
          - "BucketName"
        condition: and

      - type: dsl
        dsl:
          - contains(tolower(header), 'x-guploader-uploadid')
          - contains(tolower(header), "aliyunoss")

