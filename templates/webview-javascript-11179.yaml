# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: webview-javascript-enabled
info:
  name: Webview JavaScript enabled
  author: gaurang
  severity: info
  tags: android,file,javascript
file:
  - extensions:
      - all
    matchers:
      - type: word
        words:
          - "Landroid/webkit/WebSettings;->setJavaScriptEnabled(Z)V"
