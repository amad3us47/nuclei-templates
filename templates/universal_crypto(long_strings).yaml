# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: extract-possible-crypto-addresses

info:
  name: Possible crypto addresses (long strings) extractor
  author: cipher387
  severity: info
  description: Extract possible crypto addresses (long strings) from web page body
  tags: osint,juicy-info,cryptocyrrency

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: regex
        part: body
        regex:
          -  '[a-zA-Z0–9_.-]{20,}'
    extractors:
      - type: regex
        part: body
        regex:
          - '[a-zA-Z0–9_.-]{20,}'


# url for test https://www.coincarp.com/currencies/cardano/richlist/
