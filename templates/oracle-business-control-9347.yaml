# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: oracle-business-control

info:
  name: Oracle Commerce Business Control Center
  author: dhiyaneshDk
  severity: info
  metadata:
    shodan-query: http.title:"Oracle Commerce"
  tags: oracle,login,panel

http:
  - method: GET
    path:
      - '{{BaseURL}}/atg/bcc'

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Oracle Commerce Business Control Center</title>'

      - type: status
        status:
          - 200
