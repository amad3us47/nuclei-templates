# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: gitlab-public-signup
info:
  name: GitLab public signup
  author: pdteam
  severity: info
  metadata:
    shodan-query: http.title:"GitLab"
  tags: gitlab,misconfig
http:
  - method: GET
    path:
      - "{{BaseURL}}/users/sign_in"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<a data-qa-selector="register_link" href="/users/sign_up">Register now</a>'
          - 'data-qa-selector="new_user_register_button"'
      - type: word
        words:
          - 'https://about.gitlab.com'
      - type: status
        status:
          - 200
      - type: word
