# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: square-oauth-secret

info:
  name: Square OAuth Secret
  author: gaurang
  severity: high

file:
  - extensions:
      - all

    extractors:
      - type: regex
        regex:
          - "sq0csp-[0-9A-Za-z\\-_]{43}"
