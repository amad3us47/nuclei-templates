# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: github-enterprise-detect

info:
  name: Detect Github Enterprise
  author: ehsahil
  severity: info
  tags: panel

http:
  - method: GET
    path:
      - "{{BaseURL}}/login"

    redirects: true
    max-redirects: 2
    matchers:
      - type: word
        words:
          - "GitHub · Enterprise"
