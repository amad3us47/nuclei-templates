# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: custom-config-check

info:
  name: Config File Check
  author: SirBugs
  severity: high

http:
  - method: GET
    path:
      - "{{BaseURL}}/config/const.DB.php.bak"

    matchers:
      - type: word
        condition: or
        words:
          - "DBHOST"
          - "DBUSER"
          - "DBPASS"
          - "DBNAME"
