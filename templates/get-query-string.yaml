# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: basic-get-querystring

info:
  name: Basic GET QueryString Request
  author: pdteam
  severity: info

http:
  - method: GET
    path:
      - "{{BaseURL}}?test=nuclei"
    matchers:
      - type: word
        words:
          - "This is test querystring matcher text"
