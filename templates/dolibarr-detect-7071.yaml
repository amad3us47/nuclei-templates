# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: dolibarr-detect

info:
  name: Dolibarr detect
  author: pikpikcu
  severity: info
  tags: tech,dolibarr

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: regex
        part: body
        regex:
          - '<title>Dolibarr - Login Dolibarr(.*)</title>'

    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - 'center">(.*)</td>'
