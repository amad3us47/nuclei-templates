# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: f5-bigip-unauthorized-access
info:
  name: F5 BIG-IP Unauthorized Access
  author: unknown
  severity: high
  description: Detects potential unauthorized access to F5 BIG-IP in the target
author: qaisar afridi
tags:
  - network
  - f5-bigip
http:
- method: GET
  path:
    - "/bigip"
    - "/status"
  matchers:
  - type: regex
    part: body
    regex:
    - "Unauthorized: Access denied"
