# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: aims-password-portal

info:
  name: AIMS Password Management Portal
  author: dhiyaneshDK
  severity: info
  reference: https://www.exploit-db.com/ghdb/6576
  tags: panel

http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100

    raw:
      - |
        GET /aims/ps/default.aspx HTTP/1.1
        Host: {{Subdomains}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title id="PageTitle">Password Management Client</title>'
      - type: status
        status:
          - 200
