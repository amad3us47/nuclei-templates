# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: old-copyright
info:
  name: Find pages with old copyright dates
  author: geeknik
  severity: info
  tags: misc
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    redirects: true
    max-redirects: 3
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '2021'
        part: body
