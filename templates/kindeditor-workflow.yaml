# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: kindeditor-workflow

info:
  name: KindEditor Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all KindEditor related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: kindeditor
        subtemplates:
          - tags: kindeditor
