id: CNVD-2018-16876

info:
  name: Cobbler任意文件读取漏洞
  author: rain
  severity: high
  description: |
    Cobbler是一款网络安装服务器套件，它能够快速建立Linux网络安装环境。
    Cobbler 2.6.11-1版本中存在任意文件读取漏洞。攻击者可利用该漏洞读取任意文件。
  reference:
    - https://bugzilla.redhat.com/show_bug.cgi?id=CVE-2016-9605
