# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: dzs-zoomsounds-listing
info:
  name: WordPress Plugin dzs zoomsounds
  author: pussycat0x
  severity: info
  description: Searches for sensitive directories present in the wordpress-plugins plugin.
  tags: wordpress,listing,wp-plugin,wp
http:
  - method: GET
    path:
      - "{{BaseURL}}/wp-content/plugins/dzs-zoomsounds/"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Index of"
          - "/wp-content/plugins/dzs-zoomsounds"
        condition: and
      - type: status
        status:
          - 200
