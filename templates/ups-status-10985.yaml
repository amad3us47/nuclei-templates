# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: ups-status
info:
  name: Multimon UPS status page
  author: dhiyaneshDK
  severity: low
  reference:
    - https://www.exploit-db.com/ghdb/752
  tags: logs,status
http:
  - method: GET
    path:
      - "{{BaseURL}}/cgi-bin/apcupsd/multimon.cgi"
      - "{{BaseURL}}/cgi-bin/multimon.cgi"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Multimon: UPS Status Page"
      - type: status
        status:
          - 200
