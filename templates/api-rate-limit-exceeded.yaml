# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: api-rate-limit-exceeded
info:
  name: API Rate Limit Exceeded
  author: unknown
  severity: medium
  description: Detects when the API rate limit is exceeded in the target
author: qaisar afridi
tags:
  - web
  - api-security
http:
- method: GET
  path:
    - "/api/v1/data"
    - "/get-data?user=admin"
  matchers:
  - type: regex
    part: body
    regex:
    - "Rate Limit Exceeded: true"
