# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: wp-license-file
info:
  name: WordPress license file disclosure
  author: yashgoti
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/license.txt"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "WordPress - Web publishing software"
      - type: status
        status:
          - 200
