# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: solarwinds-orion
info:
  name: SolarWinds Orion Panel
  author: puzzlepeaches
  severity: info
  tags: panel
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        GET /Orion/Login.aspx HTTP/1.1
        Host: {{Subdomains}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_4) AppleWebKit/537.36 (KHTML, like Gecko)
    matchers:
      - type: word
        words:
          - "SolarWinds Orion"
        part: body
