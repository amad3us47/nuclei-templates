# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: shoppable-token
info:
  name: Shoppable Service Auth Token
  author: philippedelteil
  severity: info
  reference: https://ask.shoppable.com/knowledge/quick-start-api-guide
  tags: exposure,shoppable,token,auth,service
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        part: body
        words:
          - data-shoppable-auth-token
