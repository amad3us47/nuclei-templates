# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: Config-file-exposure

info:
  name: Config file exposure
  author: unknown
  description: This template can be used to detect config files containing sensitive information.
  severity: low
  tags: exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/sftp-config.json"
      - "{{BaseURL}}/user-config.json"
      - "{{BaseURL}}/ssh-config.json"
      - "{{BaseURL}}/database-config.json"
      - "{{BaseURL}}/config.json"

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "sftp_password"
          - "ftp_password"
          - "ssh_password"
          - "ssh_username"
          - "credentials:"
          - "DB_NAME"
          - "DB_USER"
          - "DB_PASSWORD"
          - "ADMIN_PASSWORD"
        condition: or
        part: body
      - type: status
        status:
          - 200
