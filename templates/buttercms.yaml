# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: api-buttercms

info:
  name: ButterCMS API Test
  author: zzeitlin
  reference: https://buttercms.com/docs/api/#introduction
  severity: info
  tags: token-spray,buttercms

http:
  - method: GET
    path:
      - "https://api.buttercms.com/v2/posts/?auth_token={{token}}"

    matchers:
      - type: status
        status:
          - 401
