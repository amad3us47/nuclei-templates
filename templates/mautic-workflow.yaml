# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: mautic-workflow

info:
  name: Mautic CRM Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Mautic CRM related nuclei templates on a given target.
workflows:
  - template: http/technologies/favicon-detect.yaml
    matchers:
      - name: mautic
        subtemplates:
          - tags: mautic
