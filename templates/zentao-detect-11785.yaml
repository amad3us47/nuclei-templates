# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: zentao-detect
info:
  name: Zentao detect
  author: pikpikcu
  severity: info
  tags: panel
http:
  - method: GET
    path:
      - "{{BaseURL}}/zentao/index.php?mode=getconfig"
    matchers:
      - type: word
        words:
          - '"sessionName":"zentaosid"'
          - '{"version":"'
        part: body
        condition: and
    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '"version":"([v0-9.]+)"'
