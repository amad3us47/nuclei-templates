# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: unauthenticated-frp
info:
  name: Unauthenticated FRP
  author: pikpikcu
  severity: info
  reference:
    - https://github.com/fatedier/frp/
  tags: frp,unauth,panel
http:
  - method: GET
    path:
      - "{{BaseURL}}/static/"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<title>frps dashboard</title>"
        part: body
      - type: status
        status:
          - 200
