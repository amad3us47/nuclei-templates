# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: git-config-crendentials
info:
  id: git-crendentials-disclosure
  name: Git Configuration Exposure
  author: twitter/drfabiocastro
  description: Template to detect Git configuration files exposed on web servers.
  severity: high
  classification:
    country: any
    tags:
      - git
      - config
      - file-exposure

  matcher-condition: or

  requests:

      method: GET
      path:
        - "/.git/config"

      description: Attempt to access Git configuration files
      condition: or

  matchers:
    - pattern: "ghp_"
      type: body
      description: Git repository configuration found in the response body

  response:
    - status:
      - 200
