# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: netscalar-aaa-login
info:
  name: NetScalar AAA Login Panel
  author: dhiyaneshDk
  severity: info
  reference: https://www.exploit-db.com/ghdb/6898
http:
  - method: GET
    path:
      - '{{BaseURL}}/logon/LogonPoint/tmindex.html'
    matchers:
      - type: word
        words:
          - "NetScaler AAA</title>"
        condition: and
