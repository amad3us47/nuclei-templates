# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: joomla-workflow

info:
  name: Joomla! Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Joomla! related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: joomla
        subtemplates:
          - tags: joomla
