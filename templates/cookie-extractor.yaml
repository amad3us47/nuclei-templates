# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: cookie-detect
info:
  name: Cookies-extractor
  author: Nagli
  description: Extract cookies
  severity: info
  tags: cookies

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    extractors:
      - type: kval
        part: header
        kval:
          - Set_Cookie
