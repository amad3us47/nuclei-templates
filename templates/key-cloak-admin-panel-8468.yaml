# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: key-cloak-admin-panel

info:
  name: Keycloak Admin Panel
  author: incogbyte
  severity: low
  tags: panel

http:
  - method: GET
    path:
      - "{{BaseURL}}/auth/admin/master/console/"

    matchers:
      - type: word
        words:
          - "<a href=\"http://www.keycloak.org\">"
        part: body
