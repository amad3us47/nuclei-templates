# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: WebLogic-Detect
info:
  name: Detect Weblogic
  author: bing0o
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}:7001/console/login/LoginForm.jsp"
      - "{{BaseURL}}/console/login/LoginForm.jsp"
    matchers:
      - type: word
        words:
          - "WebLogic"
