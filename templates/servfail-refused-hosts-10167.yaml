# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: servfail-refused-hosts
info:
  name: Servfail Host Finder
  author: mzack9999
  severity: info
dns:
  - name: "{{FQDN}}"
    type: A
    class: inet
    recursion: true
    retries: 3
    matchers:
      - type: word
        words:
          - "SERVFAIL"
          - "REFUSED"
