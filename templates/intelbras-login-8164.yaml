# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: intelbras-login
info:
  name: Intelbras Login
  author: DhiyaneshDK
  severity: info
  reference: https://www.exploit-db.com/ghdb/7272
  metadata:
    shodan-dork: http.title:"Intelbras"
    google-dork: intitle:"Intelbras" "All Rights Reserved" -.com
  tags: panel
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        GET /login.html HTTP/1.1
        Host: {{Subdomains}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0
        Accept-Encoding: gzip, deflate
        Accept: */*
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<title>Intelbras</title>"
      - type: status
        status:
          - 200
