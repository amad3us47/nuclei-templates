# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: github-personal-token
info:
  name: Github Personal Token
  author: geeknik
  severity: high
  tags: token,file
file:
  - extensions:
      - all
    extractors:
      - type: regex
        regex:
          - "ghp_.{36}"
