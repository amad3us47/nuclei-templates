# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: rconfig-workflow

info:
  name: rConfig Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all rConfig related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: rconfig
        subtemplates:
          - tags: rconfig
