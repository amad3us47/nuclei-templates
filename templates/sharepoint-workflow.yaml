# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sharepoint-workflow

info:
  name: Microsoft Sharepoint Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Microsoft Sharepoint related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: sharepoint
        subtemplates:
          - tags: sharepoint
