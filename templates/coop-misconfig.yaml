# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: coop-misconfig
info:
  name: COOP Misconfiguration
  author: unknown
  severity: medium
  description: Detects potential Cross-Origin Opener Policy (COOP) misconfigurations in the target
author: qaisar afridi
tags:
  - web
  - coop
http:
- method: GET
  path:
    - "/"
    - "/home"
  matchers:
  - type: regex
    part: headers
    regex:
    - "Cross-Origin-Opener-Policy:.*"
