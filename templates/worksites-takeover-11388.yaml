# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: worksites-takeover
info:
  name: worksites takeover detection
  author: melbadry9
  severity: high
  reference:
    - https://blog.melbadry9.xyz/dangling-dns/xyz-services/ddns-worksites
  tags: takeover
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: regex
        regex:
          - "(?:Company Not Found|you&rsquo;re looking for doesn&rsquo;t exist)"
