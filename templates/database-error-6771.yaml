# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: database-error
info:
  name: Database Error
  author: dhiyaneshDK
  severity: info
  metadata:
    shodan-query: http.title:"Database Error"
  tags: misconfig,database
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Database Error</title>'
      - type: status
        status:
          - 500
