# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: zcms-workflow

info:
  name: ZCMS Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all ZCMS related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: zcms
        subtemplates:
          - tags: zcms
