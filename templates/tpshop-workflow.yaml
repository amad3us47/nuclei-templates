# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: tpshop-workflow

info:
  name: TPshop Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all TPshop related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: tpshop
        subtemplates:
          - tags: tpshop
