# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: remkon-manager-detect
info:
  name: Remkon Device Manager Detect
  author: pikpikcu
  severity: info
  tags: remkon,tech,panel
http:
  - method: GET
    path:
      - '{{BaseURL}}/login.php'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "<title>Remkon Device Manager</title>"
