# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: csrf-double-submit-cookie
info:
  name: CSRF Double Submit Cookie
  author: unknown
  severity: high
  description: Detects potential CSRF vulnerabilities using double submit cookie in the target
author: qaisar afridi
tags:
  - web
  - csrf
http:
- method: POST
  path:
    - "/transfer"
    - "/update"
  matchers:
  - type: regex
    part: body
    regex:
    - "document\\.cookie\\.indexOf\\('csrf_token'\\) !== -1"
