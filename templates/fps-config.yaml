# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: fps-config

info:
  name: FrontPage Server Config Exposure
  author: nullenc0de
  severity: critical
  description: FrontPage Server Config Exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/_vti_pvt/service.pwd"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "# -FrontPage-"
        part: body
