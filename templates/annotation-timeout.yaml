# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: annotation-timeout

info:
  name: Basic Annotation Timeout
  author: pdteam
  severity: info

http:
  - raw:
      - |
        @timeout: 5s
        GET / HTTP/1.1
        Host: {{Hostname}}

    matchers:
      - type: word
        words:
          - "This is test matcher text"
