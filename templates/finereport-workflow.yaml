# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: finereport-workflow

info:
  name: FineReport Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all FineReport related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: finereport
        subtemplates:
          - tags: finereport
