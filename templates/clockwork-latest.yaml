# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: check-clockwork-latest

info:
  name: Check for /__clockwork/latest
  author: SirBugs
  severity: info
  reference: https://example.com/reference
  tags: leaks, information, clockwork, latest

http:
  - method: GET
    path:
      - "/__clockwork/latest"

    matchers:
      - type: word
        words:
          - "\"headers\":"
          - "\"uri\":"
        condition: and
        part: body
