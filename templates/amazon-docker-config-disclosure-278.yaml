# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: amazon-docker-config-disclosure
info:
  name: Dockerrun AWS Configuration Exposure
  author: pdteam
  severity: medium
  tags: config,exposure,aws,devops
http:
  - method: GET
    path:
      - '{{BaseURL}}/Dockerrun.aws.json'
    matchers:
      - type: word
        words:
          - 'AWSEBDockerrunVersion'
          - 'containerDefinitions'
        condition: and
