# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: glpi-login

info:
  name: GLPI - Аутентификация
  author: dhiyaneshDk
  severity: info
  reference: https://www.exploit-db.com/ghdb/7002
  tags: panel

http:
  - method: GET
    path:
      - '{{BaseURL}}'
      - '{{BaseURL}}/glpi/'

    matchers:
      - type: word
        words:
          - '<title>GLPI - Аутентификация</title>'
          - 'GLPI Copyright'
        condition: and
