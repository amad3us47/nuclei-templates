# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: grafana-detect
info:
  name: Grafana panel detect
  author: organiccrap
  severity: info
  tags: panel,grafana
http:
  - method: GET
    path:
      - "{{BaseURL}}/login"
    matchers:
      - type: word
        words:
          - "<title>Grafana</title>"
        part: body
    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - 'Grafana ([v0-9.]+)'
