# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: nextcloud-detect
info:
  name: Nextcloud Detect
  author: skeltavik
  severity: info
  description: Detects Nextcloud
  tags: tech,nextcloud,storage
  reference: https://nextcloud.com
http:
  - method: GET
    path:
      - '{{BaseURL}}'
      - '{{BaseURL}}/login'
      - '{{BaseURL}}/nextcloud/index.php/login'
    stop-at-first-match: true
    redirects: true
    max-redirects: 2
    matchers:
      - type: word
        part: body
        words:
          - 'var nc_lastLogin'
