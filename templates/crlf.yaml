# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: crlf
template:
   name: crlf-discovery
   severity: info
   author: zoidsec
   description: CRLF Discovery

request:
   payloads:
      - "%0D%0ASet-Cookie:mycookie=myvalue"

   paths: false
response:
   statusCode: 200
   header:
      -  "Set-Cookie:mycookie=myvalue"
   exclude:
      - "%0D%0A"
