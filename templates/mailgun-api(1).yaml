# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: mailgun-api-key

info:
  name: Mailgun API Key
  author: gaurang
  severity: high
  tags: token,file,mailgun

file:
  - extensions:
      - all

    extractors:
      - type: regex
        regex:
          - "key-[0-9a-zA-Z]{32}"
