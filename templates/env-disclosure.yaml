# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: env-disclose

info:
  name: env.js Disclosure
  author: SirBugs
  severity: high
  description: This Template checks disclosing secret information via /assets/env.js
  tags: env, env.js, js

http:
  - method: GET
    path:
      - '{{BaseURL}}/assets/env.js'
    matchers:
      - type: word
        part: body
        condition: or
        words:
          - '["env"]'
          - 'Environment variables'
