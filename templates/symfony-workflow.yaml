# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: symfony-workflow

info:
  name: Symfony Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Symfony related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: symfony
        subtemplates:
          - tags: symfony
