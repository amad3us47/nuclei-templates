# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: druid-default-password2

info:
  name: Druid Default Password
  author: pikpikcu
  severity: high
  tags: druid,default-login


http:
  - raw:
      - |
        POST /submitLogin HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        loginUsername=admin&loginPassword=admin
    matchers-condition: and
    matchers:

      - type: status
        status:
          - 200

      - type: regex
        regex:
          - "^success$"
