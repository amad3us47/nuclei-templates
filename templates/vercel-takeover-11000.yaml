# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: vercel-takeover
info:
  name: vercel takeover detection
  author: pdteam
  severity: info
  tags: takeover
  reference: https://github.com/EdOverflow/can-i-take-over-xyz/issues/183
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - The deployment could not be found on Vercel.
          - DEPLOYMENT_NOT_FOUND
        condition: and
