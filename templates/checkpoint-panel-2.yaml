# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: checkpoint-panel2

info:
  name: Checkpoint Panel
  author: 0x240x23elu
  severity: info
  tags: panel,checkpoint


http:
  - raw:
      - |
        GET /Login/Login HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - "Check Point Software Technologies Ltd. All rights reserved."
          - "/Login/images/CompanyLogo.png"
        condition: and
      - type: word
        part: header
        words:
          - "text/html"
