# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: openemr-detect
info:
  name: OpenEMR Product Detect
  author: pussycat0x
  severity: info
  metadata:
    shodan-dork: 'app="OpenEMR"'
  tags: panel,openemr
http:
  - method: GET
    path:
      - "{{BaseURL}}/interface/login/login.php?site=default"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '"title":"OpenEMR Product Registration"'
      - type: status
        status:
          - 200
