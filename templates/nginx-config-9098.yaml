# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: nginx-config
info:
  name: Nginx Config file disclosure
  author: sheikhrishad
  severity: info
  tags: config,exposure,nginx
http:
  - method: GET
    path:
      - "{{BaseURL}}/nginx.conf"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "server"
          - "listen"
          - "server_name"
        condition: and
      - type: status
        status:
          - 200
