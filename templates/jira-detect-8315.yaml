# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: jira-detect
info:
  name: Detect Jira Issue Management Software
  author: pdteam
  severity: info
  tags: panel
http:
  - method: GET
    path:
      - "{{BaseURL}}/secure/Dashboard.jspa"
      - "{{BaseURL}}/jira/secure/Dashboard.jspa"
      - "{{BaseURL}}/login.jsp"
    redirects: true
    max-redirects: 2
    matchers:
      - type: word
        words:
          - "Project Management Software"
