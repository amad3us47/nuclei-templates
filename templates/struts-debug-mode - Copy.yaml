# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: struts-debug-mode

info:
  name: Apache Struts setup in Debug-Mode
  author: pdteam
  severity: low
  tags: logs,struts,apache,exposure

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    matchers:
      - type: word
        words:
          - "<debug>"
          - "<struts.actionMapping>"
        condition: and
