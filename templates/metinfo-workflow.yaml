# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: metinfo-workflow

info:
  name: MetInfo Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all MetInfo related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: metinfo
        subtemplates:
          - tags: metinfo
