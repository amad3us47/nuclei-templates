# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: aws-bucket-service

info:
  name: Detect websites using AWS bucket storage
  author: pdteam
  severity: info
  tags: aws,tech

http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100

    raw:
      - |
        GET / HTTP/1.1
        Host: {{Subdomains}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0
        Accept-Encoding: gzip, deflate
        Accept: */*

    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - contains(tolower(all_headers), 'x-amz-bucket')
          - contains(tolower(all_headers), 'x-amz-request')
          - contains(tolower(all_headers), 'x-amz-id')
          - contains(tolower(all_headers), 'AmazonS3')
        part: header
        condition: or

      - type: dsl
        dsl:
          - contains(tolower(all_headers), 'x-guploader-uploadid')
        part: header
