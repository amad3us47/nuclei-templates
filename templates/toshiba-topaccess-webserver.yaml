# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: toshiba-topaccess-webserver

info:
  name: Toshiba TopAccess Web Server
  author: alexrydzak
  severity: info
  tags: toshiba,web,panel

http:
  - method: GET
    path:
      - "{{BaseURL}}/?MAIN=TOPACCESS"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<!--<title class="clsTitle1">TopAccess</title>-->'

      - type: status
        status:
          - 200
