# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: default-openresty
info:
  name: OpenResty Default Page
  author: dhiyaneshDk
  severity: info
  metadata:
    shodan-query: http.title:"Welcome to OpenResty!"
  tags: tech,openresty
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers:
      - type: word
        words:
          - "<title>Welcome to OpenResty!</title>"
        part: body
