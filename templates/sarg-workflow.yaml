# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sarg-workflow

info:
  name: SARG Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all SARG related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: sarg
        subtemplates:
          - tags: sarg
