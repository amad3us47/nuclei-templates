# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: zabbix-workflow

info:
  name: Zabbix Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Zabbix related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: zabbix
        subtemplates:
          - tags: zabbix
