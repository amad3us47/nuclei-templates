# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: globalprotect-panel

info:
  name: PaloAlto Networks GlobalProtect Panel
  author: organiccrap
  severity: info
  tags: panel,panos,globalprotect

http:
  - method: GET
    path:
      - "{{BaseURL}}/global-protect/login.esp"
      - "{{BaseURL}}/sslmgr"

    stop-at-first-match: true
    matchers:
      - type: word
        words:
          - "<title>GlobalProtect Portal</TITLE>"
          - "<msg>Invalid parameters</msg>"
        condition: or
