# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: ftpconfig
info:
  name: Atom remote-ssh ftpconfig
  author: geeknik
  description: Created by remote-ssh for Atom, contains SFTP/SSH server details and credentials
  severity: high
  tags: atom,ftp,config
http:
  - method: GET
    path:
      - "{{BaseURL}}/.ftpconfig"
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "text/plain"
      - type: status
        status:
          - 200
      - type: word
        words:
          - "protocol"
          - "host"
          - "port"
          - "user"
        condition: and
