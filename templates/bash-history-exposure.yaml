# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: bash-history-exposure
info:
  name: Bash History Exposure
  author: yourname
  severity: high

http:
  - method: GET
    path:
      - "{{BaseURL}}/.bash_history"

    matchers:
      - type: word
        part: body
        words:
          - "db_newmdb.sql"
          - "mysql -u"
