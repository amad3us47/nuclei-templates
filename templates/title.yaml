# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: extract-titles

info:
  name: Titles extractor
  author: cipher387
  severity: info
  description: Extract titles from web page body
  tags: osint,juicy-info,scraping

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: regex
        part: body
        regex:
          - '<title>.*</title>*'
    extractors:
      - type: regex
        part: body
        regex:
          - '<title>.*</title>*'
