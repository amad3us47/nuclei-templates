# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: content-scheme

info:
  name: Content Scheme Enabled
  author: gaurang
  severity: info
  tags: android,file

file:
  - extensions:
      - xml

    matchers:
      - type: word
        words:
          - "android:scheme=\"content\""
