# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: splunk-enterprise-panel
info:
  name: Splunk Enterprise Panel
  author: praetorian-thendrickson
  severity: info
  reference: https://www.shodan.io/search?query=title%3A%22Login+Splunk%22
  tags: panel,splunk
http:
  - method: GET
    path:
      - '{{BaseURL}}/en-US/account/login'
    redirects: true
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Splunk Inc.'
          - 'splunkd'
          - 'Splunk Enterprise'
