# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: valid-gmail-checker

info:
  name: Valid Google Mail Checker
  author: dievus,dwisiswant0
  severity: info
  reference:
    - https://github.com/dievus/geeMailUserFinder

self-contained: true
http:
  - method: HEAD
    path:
      - "https://mail.google.com/mail/gxlu?email={{email}}"

    matchers:
      - type: word
        part: header
        words:
          - "COMPASS"
