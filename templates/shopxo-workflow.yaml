# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: shopxo-workflow

info:
  name: ShopXO Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all ShopXO related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: shopxo
        subtemplates:
          - tags: shopxo
