# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: default-movable-page

info:
  name: Movable Default Page
  author: dhiyaneshDk
  severity: info
  tags: tech,movable
  metadata:
    shodan-query: 'title:"Welcome to Movable Type"'

http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers:
      - type: word
        words:
          - "<title>Welcome to Movable Type</title>"
        part: body
