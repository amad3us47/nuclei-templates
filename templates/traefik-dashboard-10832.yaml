# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: traefik-dashboard-detect
info:
  name: Traefik Dashboard
  author: schniggie & StreetOfHackerR007
  severity: info
  tags: panel
http:
  - method: GET
    path:
      - "{{BaseURL}}/dashboard/"
    matchers:
      - type: word
        words:
          - "<meta name=description content=\"Traefik UI\">"
        part: body
