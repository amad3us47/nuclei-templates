# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: apache-loadbalancer

info:
  name: Apache Load Balancer Manager
  author: nithissh
  severity: info

http:
  - method: GET
    path:
      - "{{BaseURL}}/balancer-manager"
    matchers:
      - type: word
        words:
          - "Load Balancer Manager"
        part: body
