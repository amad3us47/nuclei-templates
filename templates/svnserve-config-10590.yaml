# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: svnserve-config
info:
  name: svnserve config file disclosure
  author: sheikhrishad
  severity: low
  tags: config,exposure,svnserve
http:
  - method: GET
    path:
      - "{{BaseURL}}/svnserve.conf"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "This file controls the configuration of the svnserve daemon"
      - type: status
        status:
          - 200
