# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: 74cms-workflow

info:
  name: 74cms Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all 74cms related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: 74cms
        subtemplates:
          - tags: 74cms
