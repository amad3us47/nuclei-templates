# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: odoo-database-manager
info:
  name: Odoo-Database-Manager
  author: __Fazal,R3dg33k
  severity: high
  tags: panel,odoo
http:
  - method: GET
    path:
      - '{{BaseURL}}/web/database/manager'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "<title>Odoo</title>"
          - "{ action: 'database_manager' }"
        condition: and
