# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: iplanet-web-server
info:
  name: Detect iPlanet Webserver Detection
  author: pussycat0x
  severity: info
  tags: tech,webserver
  metadata:
    fofa-query: 'app="iPlanet-Web-Server,-Enterprise-Edition-4.1"'
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "iPlanet"
      - type: status
        status:
          - 200
