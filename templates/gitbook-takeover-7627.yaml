# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: gitbook-takeover
info:
  name: gitbook takeover detection
  author: philippedelteil
  severity: high
  reference:
    - https://github.com/EdOverflow/can-i-take-over-xyz/issues/259
    - https://hackerone.com/reports/223625
  tags: takeover,gitbook
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - "If you need specifics, here's the error"
          - "Domain not found"
        condition: and
