# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: defectdojo-panel

info:
  name: DefectDojo Exposure
  author: Adam Crosser
  severity: info
  tags: panel,defectdojo
  metadata:
    shodan-query: 'html:"DefectDojo Logo"'

http:
  - method: GET
    path:
      - '{{BaseURL}}/login?next='

    matchers:
      - type: word
        words:
          - "<img src=\"/static/dojo/img/logo.png\" alt=\"DefectDojo Logo"
