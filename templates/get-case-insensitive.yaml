# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: basic-get-case-insensitive

info:
  name: Basic GET Request
  author: pdteam
  severity: info

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        case-insensitive: true
        words:
          - "ThIS is TEsT MAtcHEr TExT"
