# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: api-wakatime

info:
  name: WakaTime CI API Test
  author: zzeitlin
  reference: https://wakatime.com/developers
  severity: info
  tags: token-spray,wakatime

http:
  - method: GET
    path:
      - "https://wakatime.com/api/v1/users/current/projects/?api_key={{token}}"

    matchers:
      - type: status
        status:
          - 401
