# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: airflow-configuration-exposure
info:
  name: Apache Airflow Configuration Exposure
  author: pdteam
  severity: medium
  tags: exposure,config,airflow,apache
http:
  - method: GET
    path:
      - '{{BaseURL}}/airflow.cfg'
    matchers:
      - type: word
        words:
          - '[core]'
          - '[api]'
        condition: and
