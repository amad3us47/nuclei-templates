# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: zabbix-server-login
info:
  name: Zabbix Login
  author: dhiyaneshDK
  severity: info
  metadata:
    shodan-query: http.title:"zabbix-server"
  tags: panel,zabbix
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<title>zabbix-server: Zabbix</title>"
      - type: status
        status:
          - 200
