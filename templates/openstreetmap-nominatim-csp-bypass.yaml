# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: openstreetmap-nominatim-csp-bypass

info:
  name: Content-Security-Policy Bypass - OpenStreetMap Nominatim
  author: renniepak,DhiyaneshDK
  severity: medium
  reference:
    - https://github.com/renniepak/CSPBypass/blob/main/data.tsv
  metadata:
    verified: true
  tags: xss,csp-bypass,openstreetmap-nominatim,vuln

flow: http(1) && headless(1)

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: word
        part: header
        words:
          - "Content-Security-Policy"
          - "openstreetmap.org"
        condition: and
        internal: true

headless:
  - steps:
      - action: navigate
        args:

