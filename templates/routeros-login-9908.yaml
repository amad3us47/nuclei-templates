# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: routeros-login
info:
  name: RouterOS router configuration page login
  author: dhiyaneshDK
  severity: info
  tags: panel,router
  metadata:
    shodan-query: 'http.title:"RouterOS router configuration page"'
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>RouterOS router configuration page</title>'
      - type: status
        status:
          - 200
