# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: airflow-exposure

info:
  name: Apache Airflow Exposure / Unauthenticated Access
  author: pd-team
  severity: medium

http:
  - method: GET
    path:
      - '{{BaseURL}}'
      - '{{BaseURL}}/admin/'
    matchers:
      - type: word
        words:
          - '<title>Airflow - DAGs</title>'
          - '<a href="https://github.com/apache/airflow">'
        condition: and
