# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: mantis-detect
info:
  name: Mantis portal detection
  author: makyotox
  severity: info
  tags: panel,mantis
http:
  - method: GET
    path:
      - "{{BaseURL}}/login_page.php"
    matchers:
      - type: word
        words:
          - "<title>MantisBT</title>"
        part: body
