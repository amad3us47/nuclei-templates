# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: android-debug-enabled

info:
  name: Android Debug Enabled
  author: gaurang
  severity: low
  tags: android,file

file:
  - extensions:
      - all

    matchers:
      - type: regex
        regex:
          - "android:debuggable=\"true\""
