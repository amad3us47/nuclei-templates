# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: artifactory-workflow

info:
  name: Artifactory Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Artifactory related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: artifactory
        subtemplates:
          - tags: artifactory
