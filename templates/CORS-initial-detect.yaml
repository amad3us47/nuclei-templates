# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: CORS-initial-detect

info:
        name: Detect CORS
        author: jtcsec
        severity: info
        tag: cors

http:
        - method: GET
          path:
                  - "{{BaseURL}}"
          headers:
                  Origin: "{{BaseURL}}"
          matchers:
                  - type: word
                    words:
                            - "Access-Control-Allow"
                    part: header
