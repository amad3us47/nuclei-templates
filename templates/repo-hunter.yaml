# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: repo-hunter

info:
  name: Repo hunter
  author: lliwi
  severity: info
  description: Search for the each repos patterns on passed URLs.
  tags: exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/{{repo-path}}"
    payloads:
      repo-path: repo-paths.txt

    stop-at-first-match: true
    threads: 50
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "Index of "
