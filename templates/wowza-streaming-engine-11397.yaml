# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: wowza-streaming-engine
info:
  name: Wowza Streaming Engine
  author: dhiyaneshDK
  severity: info
  reference:
    - https://www.shodan.io/search?query=http.title%3A%22Manager%22+product%3A%22Wowza+Streaming+Engine%22
  tags: panel
http:
  - method: GET
    path:
      - '{{BaseURL}}/enginemanager/ftu/welcome.htm'
    matchers-condition: and
