# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: mx-fingerprint

info:
  name: MX Fingerprint
  author: pdteam
  severity: info
  tags: dns,mx

dns:
  - name: "{{FQDN}}"
    type: MX

    matchers:
      - type: word
        words:
          - "IN\tMX"

    extractors:
      - type: regex
        group: 1
        regex:
          - "IN\tMX\t(.+)"
