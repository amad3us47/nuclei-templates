# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: webmodule-ee-panel
info:
  name: Webmodule Login Panel
  author: pussycat0x,daffainfo
  severity: info
  reference:
    - https://www.exploit-db.com/ghdb/7001
  metadata:
    google-dork: intitle:"Webmodule" inurl:"/webmodule-ee/login.seam" "Version"
  tags: panel,webmodule-ee,login
http:
  - method: GET
    path:
      - "{{BaseURL}}/webmodule-ee/login.seam"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<title>Webmodule</title>"
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - 'Version: ([0-9.]+)'
