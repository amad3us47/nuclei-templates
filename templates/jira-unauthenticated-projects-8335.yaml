# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: jira-unauthenticated-projects
info:
  name: Jira Unauthenticated Projects
  author: TechbrunchFR
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/rest/api/2/project?maxResults=100"
    matchers:
      - type: word
        words:
          - 'projects'
          - 'startAt'
          - 'maxResults'
        condition: and
