# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: xenforo-login
info:
  name: XenForo Login/Register
  author: dhiyaneshDk
  severity: info
  metadata:
    shodan-query: http.title:"XenForo"
  tags: panel
http:
  - method: GET
    path:
      - '{{BaseURL}}/index.php'
    matchers:
      - type: word
        words:
          - '<title>XenForo</title>'
        condition: and
