# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: phppgadmin-workflow

info:
  name: phpPgAdmin Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all phpPgAdmin related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: phppgadmin
        subtemplates:
          - tags: phppgadmin
