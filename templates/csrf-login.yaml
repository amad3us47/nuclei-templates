# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: csrf-login
info:
  name: Cross-Site Request Forgery (CSRF) in Login
  author: unknown
  severity: high
  description: Detects potential CSRF vulnerabilities in the login process
author: qaisars
tags:
  - web
  - authentication
http:
- method: POST
  path: "/login"
  matchers:
  - type: regex
    part: body
    regex:
    - "CSRF token validation failed"
