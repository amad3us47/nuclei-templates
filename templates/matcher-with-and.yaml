# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: file-matcher-with-or

info:
  name: File Matcher With OR
  author: pdteam
  severity: info
  tags: file

file:
  - extensions:
      - all

    matchers:
      - type: word
        words:
          - "AA"
      - type: word
        words:
          - "BB"
