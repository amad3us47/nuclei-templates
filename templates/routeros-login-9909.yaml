# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: routeros-login
info:
  name: RouterOS Router Login Detect
  author: dhiyaneshDK,idealphase
  severity: info
  metadata:
    shodan-query: http.title:"RouterOS router configuration page"
  tags: panel,router,routeros
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>RouterOS router configuration page</title>'
      - type: status
        status:
          - 200
    extractors:
      - type: regex
        group: 1
        regex:
          - '<h1>RouterOS v(.+)<\/h1>'
