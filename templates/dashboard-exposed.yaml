# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: Dashboard-Exposed-bypassing-authentication
info:
  name: Find Exposed dashboard
  author: Clark
  severity: medium
http:
  - method: GET
    path:
      - "{{BaseURL}}/dashboard"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - dashboard
        condition: and

      - type: status
        status:
          - 200
