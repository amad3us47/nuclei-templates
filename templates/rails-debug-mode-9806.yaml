# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: rails-debug-mode
info:
  name: Rails Debug Mode
  author: pdteam
  severity: medium
  tags: debug,rails,exposure
http:
  - method: GET
    path:
      - "{{BaseURL}}/{{randstr}}"
    matchers:
      - type: word
        part: body
        words:
          - "Rails.root:"
          - "Action Controller: Exception caught"
        condition: and
