# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: mysql-native-password

info:
  name: MySQL DB with enabled native password
  author: iamthefrogy
  severity: info
  description: MySQL instance with enabled native password support is prone to password brute-force attacks.
  tags: network,mysql,bruteforce,db

tcp:
  - host:
      - "{{Hostname}}"
      - "{{Host}}:3306"

    matchers:
      - type: word
        words:
          - "mysql_native_password"
