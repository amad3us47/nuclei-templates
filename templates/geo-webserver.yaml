# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: geo-webserver

info:
  name: GeoWebServer Detector
  author: dhiyaneshDK
  severity: info
  metadata:
    shodan-query: http.title:"GeoWebServer"
  tags: panel,geowebserver

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "<TITLE>GeoWebServer</TITLE>"
