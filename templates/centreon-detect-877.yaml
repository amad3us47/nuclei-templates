# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: centreon-detect

info:
  name: Centreon Detect
  author: pikpikcu
  severity: info
  tags: tech,centreon

http:
  - method: GET
    path:
      - "{{BaseURL}}/centreon/index.php"

    matchers-condition: and
    matchers:

      - type: word
        part: body
        words:
          - "<title>Centreon - IT & Network Monitoring</title>"

      - type: status
        status:
          - 200
