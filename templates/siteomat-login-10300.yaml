# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: siteomat-loader
info:
  name: Orpak SiteOmat login portals
  author: dhiyaneshDK
  severity: info
  reference: https://www.exploit-db.com/ghdb/6624
  tags: panel
http:
  - method: GET
    path:
      - '{{BaseURL}}/login.htm'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>SiteOmat Login</title>'
      - type: status
        status:
          - 200
