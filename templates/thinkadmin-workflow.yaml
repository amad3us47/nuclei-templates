# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: thinkadmin-workflow

info:
  name: ThinkAdmin Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all ThinkAdmin related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: thinkadmin
        subtemplates:
          - tags: thinkadmin
