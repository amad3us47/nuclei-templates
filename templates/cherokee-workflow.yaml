# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: cherokee-workflow

info:
  name: Cherokee Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Cherokee related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: cherokee
        subtemplates:
          - tags: cherokee
