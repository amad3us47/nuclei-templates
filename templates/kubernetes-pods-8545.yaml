# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: kubernetes-pods-api
info:
  name: Kubernetes Pods API
  author: ilovebinbash
  severity: info
http:
  - method: GET
    path:
      - '{{BaseURL}}:10250/pods'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "apiVersion"
        part: body
      - type: word
        words:
          - "application/json"
        part: header
