# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: prestashop-detect
info:
  name: PrestaShop Tech Detection
  author: pdteam
  severity: info
  tags: tech,cms,prestashop
  metadata:
    shodan-query: http.component:"PrestaShop"
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    redirects: true
    max-redirects: 2
    matchers:
      - type: regex
        part: body
        regex:
          - Powered by <a\s+[^>]+>PrestaShop
          - <!-- /Block [a-z ]+ module (?:HEADER|TOP)?\s?-->
          - <!-- /Module Block [a-z ]+ -->
        condition: or
