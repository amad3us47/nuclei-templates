# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: stripe-api-key
info:
  name: Stripe API Key
  author: gaurang
  severity: high
  tags: token,file,stripe
file:
  - extensions:
      - all
    extractors:
      - type: regex
        regex:
          - "(?i)stripe(.{0,20})?[sr]k_live_[0-9a-zA-Z]{24}"
