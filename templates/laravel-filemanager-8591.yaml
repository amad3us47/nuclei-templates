# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: laravel-filemanager
info:
  name: Laravel FileManager Panel Detect
  author: princechaddha
  severity: info
  reference:
    - https://github.com/UniSharp/laravel-filemanager
  tags: laravel,filemanager,fileupload
http:
  - method: GET
    path:
      - "{{BaseURL}}/laravel-filemanager?type=Files"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Laravel FileManager"
      - type: status
        status:
          - 200
