# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: wordpress-xmlrpc-file
info:
  name: WordPress xmlrpc
  author: udit_thakkur
  severity: info
  tags: wordpress
http:
  - method: GET
    path:
      - "{{BaseURL}}/xmlrpc.php"
    matchers:
      - type: word
        words:
          - 'XML-RPC server accepts POST requests only.'
