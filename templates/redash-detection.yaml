# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: redash-panel
info:
  name: Redash Panel
  author: Adam Crosser
  severity: info
  tags: panel
http:
  - method: GET
    path:
      - '{{BaseURL}}/'
    redirects: true
    matchers:
      - type: word
        words:
          - '<title>Login to Redash</title>'
