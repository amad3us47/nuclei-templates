# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: drupal-install

info:
  name: Drupal Install
  author: NkxxkN
  severity: low
  tags: exposure,drupal

http:
  - method: GET
    path:
      - "{{BaseURL}}/install.php?profile=default"

    redirects: true
    max-redirects: 1
    matchers:
      - type: word
        words:
          - "<title>Choose language | Drupal</title>"
