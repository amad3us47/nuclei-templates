# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: pure-storage-login
info:
  name: Pure Storage Login
  author: dhiyaneshDK
  severity: info
  metadata:
    shodan-query: 'http.title:"Pure Storage Login"'
  tags: panel,purestorage
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Pure Storage Login</title>'
      - type: status
        status:
          - 200
