# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: kube-dashboard

info:
  name: Kubernetes Dashboard Detection
  author: notnotnotveg
  severity: info

http:
  - method: GET
    path:
      - "{{BaseURL}}/dashboard/#!/namespace?namespace=default"
    matchers:
      - type: word
        words:
          - "kubernetesDashboard"
        part: body
