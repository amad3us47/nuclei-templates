# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: x-hacker

info:
  name: Displays the X-Hacker server header if defined
  author: geeknik
  severity: info

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    extractors:
      - type: regex
        part: header
        name: x-hacker
        regex:
          - '(?i)X-Hacker:.*'
