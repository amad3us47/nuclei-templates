# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: minio-console-detect
info:
  name: MinIO Console Detection
  author: pussycat0x
  severity: info
  tags: panel,minio
  metadata:
    fofa-query: 'app="MinIO-Console"'
http:
  - method: GET
    path:
      - "{{BaseURL}}/login"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>MinIO Console</title>'
      - type: status
        status:
          - 200
