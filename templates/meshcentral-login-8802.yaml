# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: meshcentral-login
info:
  name: MeshCentral - Login
  author: dhiyaneshDk
  severity: info
  metadata:
    shodan-query: 'http.title:"MeshCentral - Login"'
  tags: panel,meshcentral
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        GET / HTTP/1.1
        Host: {{Subdomains}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0
        Accept-Encoding: gzip, deflate
        Accept: */*
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>MeshCentral - Login</title>"
      - type: status
        status:
          - 200
