# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: cors-misconfig
info:
  name: CORS Misconfiguration
  author: unknown
  severity: medium
  description: Detects potential CORS misconfigurations in the target
author: qaisar afridi
tags:
  - web
  - cors
http:
- method: OPTIONS
  path:
    - "/api"
    - "/check-cors"
  matchers:
  - type: regex
    part: headers
    regex:
    - "Access-Control-Allow-Origin: .*"
