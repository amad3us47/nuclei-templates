# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: jaspersoft-detect

info:
  name: Jaspersoft detected
  author: koti2
  severity: info

http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100

    raw:
      - |
        GET /jasperserver/login.html?error=1 HTTP/1.1
        Host: {{Subdomains}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0
        Accept-Encoding: gzip, deflate
        Accept: */*

    matchers:
      - type: word
        words:
          - "TIBCO Jaspersoft: Login"
          - "Could not login to JasperReports Server"
          - "About TIBCO JasperReports Server"
        condition: or
