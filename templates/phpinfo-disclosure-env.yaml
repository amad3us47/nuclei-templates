# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: phpinfo-disclosure-env
info:
  id: phpinfo-disclosure-env
  name: PHP Info Disclosure via Environment Variable - Detect
  author: OpenAI
  description: Template to detect PHP Info disclosure through the environment variable
  severity: high
  classification:
    country: any
    tags:
      - exposure
  matcher-condition: and

  requests:
      method: GET
      path:
        - "/phpinfo.php"
        - "/info.php"
      description: Attempt to access PHP Info page
      condition: and

  matchers:
    - pattern: "APP_ENV"
      type: env
      description: PHP Info page displaying environment variable

  response:
    - status:
        - 200
      description: Successful response status
