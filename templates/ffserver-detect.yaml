# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: ffserver-detect

info:
  name: FFServer Detect
  author: notnotnotveg
  severity: info

http:
  - method: GET
    path:
      - "{{BaseURL}}:8090/status.html"
      - "{{BaseURL}}/status.html"
    matchers:
      - type: word
        words:
          - "<title>ffserver Status"
        part: body
