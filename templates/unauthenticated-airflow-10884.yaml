# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: unauthenticated-airflow-instance
info:
  name: Unauthenticated Airflow Instance
  author: dhiyaneshDK
  severity: high
  tags: apache,airflow,unauth
  metadata:
    shodan-query: title:"Airflow - DAGs"
http:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/admin/"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>Airflow - DAGs</title>"
      - type: status
        status:
          - 200
