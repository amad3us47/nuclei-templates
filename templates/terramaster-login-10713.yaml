# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: terramaster-login
info:
  name: TerraMaster Login Panel
  author: gy741
  severity: info
  tags: panel,terramaster
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        GET / HTTP/1.1
        Host: {{Subdomains}}
        User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_4) AppleWebKit/537.36 (KHTML, like Gecko)
    matchers-condition: or
    matchers:
      - type: word
        words:
          - "<title>TOS Loading</title>"
        part: body
      - type: word
        words:
          - "Server: TOS"
          - "X-Powered-By: TerraMaster"
        condition: or
        part: header
