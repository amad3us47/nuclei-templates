# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: solr-admin-query
info:
  name: Solr - Admin Page Access
  author: dhiyaneshDK
  severity: high
  description: Solr's admin page was able to be accessed with no authentication requirements in place.
  reference:
    - https://www.exploit-db.com/ghdb/5856
  tags: solr,unauth
http:
  - method: GET
    path:
      - '{{BaseURL}}/admin/'
      - '{{BaseURL}}/solr/admin/'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Solr admin page</title>'
      - type: status
        status:
          - 200

