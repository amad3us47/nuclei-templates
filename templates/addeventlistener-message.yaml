# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: addeventlistener-message
info:
  name: AddEventlistener('message') in body
  author: yavolo
  severity: info
  tags: xss
  reference: https://github.com/yavolo/nuclei-templates/
http:
  - method: GET
    path:
      - '{{BaseURL}}/'
    matchers:
      - type: regex
        regex:
          - addEventListener\("message
          - addEventListener\('message
          - addeventlistener\("message
          - addeventlistener\('message
        part: body
