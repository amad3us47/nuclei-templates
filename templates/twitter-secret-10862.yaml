# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: twitter-secret
info:
  name: Twitter Secret
  author: gaurang
  severity: medium
  tags: token,file,twitter
file:
  - extensions:
      - all
    extractors:
      - type: regex
        regex:
          - "(?i)twitter(.{0,20})?[0-9a-z]{35,44}"
