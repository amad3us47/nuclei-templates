# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: yarn-resourcemanager-rce
info:
  name: Apache Yarn ResourceManager RCE
  author: pdteam
  severity: low
  tags: apache,rce
  reference: https://neerajsabharwal.medium.com/hadoop-yarn-hack-9a72cc1328b6
http:
  - method: POST
    path:
      - '{{BaseURL}}/ws/v1/cluster/apps/new-application'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - application-id
          - maximum-resource-capability
        condition: and
      - type: status
        status:
          - 200
