# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: novnc-workflow

info:
  name: noVNC Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all noVNC related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: novnc
        subtemplates:
          - tags: novnc
