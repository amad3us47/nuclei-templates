# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: git-config
info:
  name: Git Config Disclosure
  author: Ice3man
  severity: medium
  description: Searches for the pattern /.git/config on passed URLs.
http:
  - method: GET
    path:
      - "{{BaseURL}}/.git/config"
    matchers:
      - type: word
        words:
          - "[core]"
