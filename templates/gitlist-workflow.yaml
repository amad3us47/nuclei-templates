# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: gitlist-workflow

info:
  name: GitList Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all GitList related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: gitlist
        subtemplates:
          - tags: gitlist
