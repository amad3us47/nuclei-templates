# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: laravel-workflow

info:
  name: Laravel Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Laravel related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: laravel
        subtemplates:
          - tags: laravel
