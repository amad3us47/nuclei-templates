# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: intercom-takeover
info:
  name: intercom takeover detection
  author: pdteam
  severity: high
  tags: takeover,intercom
  reference: https://github.com/EdOverflow/can-i-take-over-xyz
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - '<h1 class="headline">Uh oh. That page doesn\’t exist.</h1>'
          - 'This page is reserved for artistic dogs.'
        condition: and
