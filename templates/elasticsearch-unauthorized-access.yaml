# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: elasticsearch-unauthorized-access
info:
  name: Elasticsearch Unauthorized Access
  author: unknown
  severity: high
  description: Detects potential unauthorized access to Elasticsearch in the target
author: qaisar afridi
tags:
  - web
  - elasticsearch
http:
- method: GET
  path:
    - "/es"
    - "/cluster-health"
  matchers:
  - type: regex
    part: body
    regex:
    - "Unauthorized: Authentication required"
