# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sourcebans-workflow

info:
  name: SourceBans Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all SourceBans related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: sourcebans
        subtemplates:
          - tags: sourcebans
