# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: helpscout-takeover

info:
  name: helpscout takeover detection
  author: pdteam
  severity: high
  reference:
    - https://github.com/EdOverflow/can-i-take-over-xyz
  tags: takeover

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:

      - type: word
        words:
          - "No settings were found for this company:"
