# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: hadoop-unauth

info:
  name: Apache Hadoop Unauth
  author: pdteam
  severity: low
  tags: apache,hadoop,unauth

http:
  - method: GET
    path:
      - '{{BaseURL}}/ws/v1/cluster/info'
    matchers:
      - type: word
        words:
          - 'hadoopVersion'
          - 'resourceManagerVersionBuiltOn'
        condition: and
