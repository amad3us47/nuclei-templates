# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: config-js

info:
  name: config.js
  author: geeknik
  severity: high

http:
  - method: GET
    path:
      - "{{BaseURL}}/config.js"
      - "{{BaseURL}}/api/config.js"
      - "{{BaseURL}}/app/config.js"
      - "{{BaseURL}}/config/config.js"
      - "{{BaseURL}}/web/config.js"
      - "{{BaseURL}}/src/config.js"
      - "{{BaseURL}}/src/api/config.js"
      - "{{BaseURL}}/web/api/config.js"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "accessKey: "
          - "secreKey: "
          - "apiKey: "
          - '"client_secret": '
          - "mongodb+srv://"
        condition: or
      - type: word
        part: header
        words:
          - "text/plain"
          - "text/javascript"
          - "application/javascript"
          - "application/x-javascript"
        condition: or
      - type: word
        part: header
        words:
          - "text/html"
