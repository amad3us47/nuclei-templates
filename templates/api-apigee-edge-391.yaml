# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: api-apigee-edge

info:
  name: Apigee Edge API Test
  author: dwisiswant0
  severity: info
  reference: https://apidocs.apigee.com/apis
  tags: token-spray,apigee

self-contained: true
http:
  - method: GET
    path:
      - "https://apimonitoring.enterprise.apigee.com/alerts"
    headers:
      Authorization: Bearer {{token}}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - '"uuid":'
          - '"name":'
        condition: and
