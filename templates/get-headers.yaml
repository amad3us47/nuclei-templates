# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: basic-get-headers

info:
  name: Basic GET Headers Request
  author: pdteam
  severity: info

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    headers:
      test: nuclei
    matchers:
      - type: word
        words:
          - "This is test headers matcher text"
