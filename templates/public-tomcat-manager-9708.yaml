# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: public-tomcat-manager
info:
  name: tomcat manager disclosure
  author: Ahmed Sherif & geeknik
  severity: info
  tags: panel
http:
  - method: GET
    path:
      - '{{BaseURL}}/manager/html'
      - '{{BaseURL}}/host-manager/html'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - Apache Tomcat
      - type: status
        status:
          - 401
          - 200
        condition: or
