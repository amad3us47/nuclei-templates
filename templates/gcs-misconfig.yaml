# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: gcs-misconfig
info:
  name: Google Cloud Storage Bucket Misconfiguration
  author: unknown
  severity: high
  description: Detects potential Google Cloud Storage bucket misconfigurations in the target
author: Qaisar Afridi
tags:
  - cloud
  - google-cloud
  - storage
http:
- method: GET
  path:
    - "/gcs"
    - "/list-buckets"
  matchers:
  - type: regex
    part: body
    regex:
    - "<Name>.*<\/Name>"
