# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: splunk-workflow

info:
  name: Splunk Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Splunk related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: splunk
        subtemplates:
          - tags: splunk
