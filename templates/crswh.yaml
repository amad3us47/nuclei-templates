# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: cswsh
info:
  name: Cross-Site WebSocket Hijacking (CSWSH)
  author: unknown
  severity: high
  description: Detects potential CSWSH vulnerabilities in the target
author: qaisar afridi
tags:
  - web
  - cswsh
http:
- method: GET
  path:
    - "/ws"
    - "/chat"
  matchers:
  - type: regex
    part: body
    regex:
    - "WebSocket connection established"
