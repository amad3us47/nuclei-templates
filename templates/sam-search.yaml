# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: saml-Exposed
info:
  name: Find saml
  author: Clark
  severity: medium
http:
  - method: GET
    path:
      - "{{BaseURL}}/saml/module.php/core/frontpage_welcome.php"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - SimpleSAMLphp
        condition: and

      - type: status
        status:
          - 200
