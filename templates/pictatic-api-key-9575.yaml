# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: pictatic-api-key
info:
  name: Pictatic API Key
  author: gaurang
  severity: high
  tags: token,file
file:
  - extensions:
      - all
    extractors:
      - type: regex
        regex:
          - "sk_live_[0-9a-z]{32}"
