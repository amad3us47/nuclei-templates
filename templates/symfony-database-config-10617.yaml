# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: symfony-database-config

info:
  name: Symfony Database Configuration Exposure
  author: pdteam,geeknik
  severity: high
  tags: config,exposure,symfony

http:
  - method: GET
    path:
      - "{{BaseURL}}/config/databases.yml"
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "text/html"
