# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: exposed-darcs

info:
  name: Exposed Darcs Config
  author: daffainfo
  severity: low
  reference: http://darcs.net/Using/Configuration#sources
  tags: config,exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/_darcs/prefs/binaries"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Binary file regexps"

      - type: status
        status:
          - 200
