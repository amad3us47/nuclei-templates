# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: huawei-home-gateway

info:
  name: HUAWEI Home Gateway HG658d
  author: dhiyaneshDK
  severity: info
  tags: iot,huawei
  metadata:
    shodan-query: 'http.title:"HUAWEI Home Gateway HG658d"'

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>HUAWEI Home Gateway HG658d</title>'

      - type: status
        status:
          - 200
