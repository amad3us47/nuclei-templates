# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: owasp-juice-shop-detect
info:
  name: OWASP Juice Shop
  author: pikpikcu
  severity: info
  metadata:
    fofa-query: title="OWASP Juice Shop"
  tags: tech,owasp
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>OWASP Juice Shop</title>"
      - type: status
        status:
          - 200
