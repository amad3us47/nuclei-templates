# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: cisco-meraki-workflow

info:
  name: Cisco Meraki Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Cisco Meraki related nuclei templates on a given target.
workflows:
  - template: http/technologies/favicon-detect.yaml
    matchers:
      - name: meraki
        subtemplates:
          - tags: meraki
