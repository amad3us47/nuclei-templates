# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: terraform-detect
info:
  name: Detect Terraform Provider
  author: geeknik
  severity: info
  description: Write Infrastructure as Code - https://www.terraform.io/
  tags: tech,terraform
http:
  - method: GET
    path:
      - "{{BaseURL}}/provider.tf"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "access_key"
          - "terraform"
        condition: and
      - type: status
        status:
          - 200
