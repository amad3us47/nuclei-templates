# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: wp-email-subscribers-listing
info:
  name: WordPress Plugin Email Subscribers Listing
  author: pussycat0x
  severity: low
  description: Searches for sensitive directories present in the wordpress-plugins plugin.
  reference: https://www.exploit-db.com/ghdb/6428
  tags: wordpress,listing
http:
  - method: GET
    path:
      - "{{BaseURL}}/wp-content/plugins/email-subscribers"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Index of"
          - "wp-content/plugins/email-subscribers"
        condition: and
      - type: status
        status:
          - 200
