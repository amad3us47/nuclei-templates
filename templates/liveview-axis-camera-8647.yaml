# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: liveview-axis-camera
info:
  name: Live view AXIS Network Camera
  author: dhiyaneshDK
  severity: info
  reference: https://www.exploit-db.com/ghdb/6843
  tags: iot
http:
  - method: GET
    path:
      - '{{BaseURL}}/view/viewer_index.shtml'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Live view  - AXIS'
      - type: status
        status:
          - 200
