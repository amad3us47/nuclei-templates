# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: wp-app-log
info:
  name: Discover wp-app.log Files
  author: geeknik
  severity: info
  tags: exposure,logs
http:
  - method: GET
    path:
      - "{{BaseURL}}/wp-app.log"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "LANG"
          - "Array"
        condition: and
      - type: word
        part: header
        words:
          - "text/html"
          - "application/javascript"
