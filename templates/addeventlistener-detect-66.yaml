# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: addeventlistener-detect

info:
  name: AddEventlistener detection
  author: yavolo
  severity: info
  tags: xss
  reference: https://portswigger.net/web-security/dom-based/controlling-the-web-message-source

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    matchers:
      - type: word
        words:
          - 'window.addEventListener('
        part: body
