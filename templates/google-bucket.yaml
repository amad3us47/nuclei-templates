# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: google-storage-bucket

info:
  name: Detect Mobile apps using Google storage Bucket
  author: Thabisocn
  severity: info

file:
  - extensions:
      - all

    extractors:
      - type: regex
        regex:
          - "[a-z0-9.-]+\\.appspot\\.com"
