# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: manageengine-opmanager
info:
  name: ZOHO ManageEngine OpManager
  author: dhiyaneshDK,daffainfo
  severity: info
  reference:
    - https://www.manageengine.com/
  metadata:
    shodan-query: http.title:"OpManager Plus"
  tags: panel,zoho,manageengine
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<div class='opmIconsHolder'>"
          - "<div class='opmLoginFieldHolder'>"
          - "<div class='opmIconsRight'>"
        condition: and
      - type: status
        status:
          - 200
