# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: custom-version

info:
  name: Basic SSL Request
  author: pdteam
  severity: info

ssl:
  - address: "{{Host}}:{{Port}}"

    min_version: tls12
    max_version: tls12

    matchers:
      - type: word
        part: response
        words:
          - 'tls12'
