# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: gitea-login
info:
  name: Gitea Login
  author: dhiyaneshDK
  severity: info
  tags: gitea,panel
  metadata:
    shodan-query: 'html:"Powered by Gitea Version"'
http:
  - method: GET
    path:
      - '{{BaseURL}}/user/login'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Powered by Gitea Version'
      - type: status
        status:
          - 200
