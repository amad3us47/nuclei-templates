# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: manageengine-supportcenter
info:
  name: ZOHO ManageEngine SupportCenter
  author: dhiyaneshDK
  severity: info
  metadata:
    shodan-query: http.title:"ManageEngine SupportCenter Plus"
  tags: panel,zoho,manageengine
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>ManageEngine SupportCenter Plus</title>'
      - type: status
        status:
          - 200
