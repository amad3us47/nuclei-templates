# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: wowza-streaming-engine
info:
  name: Wowza Streaming Engine
  author: dhiyaneshDK
  severity: info
  metadata:
    shodan-query: http.title:"Manager" product:"Wowza Streaming Engine"
  tags: panel
http:
  - method: GET
    path:
      - '{{BaseURL}}/enginemanager/ftu/welcome.htm'
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Wowza Streaming Engine Manager</title>'
      - type: status
        status:
          - 200
