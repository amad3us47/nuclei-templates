# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: oscommerce-workflow

info:
  name: osCommerce Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all osCommerce related nuclei templates on a given target.
workflows:
  - template: http/technologies/tech-detect.yaml
    matchers:
      - name: oscommerce
        subtemplates:
          - tags: oscommerce
