# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: Wordpress-save
info:
  name: Wordpress config file
  author: Excis3
  severity: medium
  description: Get the wordpress config file

http:
  - method: GET
    path:
      - "{{BaseURL}}/blog/wp-config.php.save"
      - "{{BaseURL}}/wp-config.php.save"
      - "{{BaseURL}}/backup/wp-config.php.save"
      - "{{BaseURL}}/backups/wp-config.php.save"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'WordPress'
      - type: status
        status:
          - 200
