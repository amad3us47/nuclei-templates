# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: basic-raw-http-example

info:
  name: Test RAW GET Template
  author: pdteam
  severity: info

http:
  - raw:
      - |
        @tls-sni:request.host
        GET / HTTP/1.1
        Host: test

    matchers:
      - type: word
        words:
          - "test-ok"
