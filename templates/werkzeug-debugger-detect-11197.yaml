# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: werkzeug-debugger-detect
info:
  name: Werkzeug debugger console
  author: pdnuclei - projectdiscovery.io
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/console"
    matchers:
      - type: word
        words:
          - "<h1>Interactive Console</h1>"
        part: body
