# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: mongo-express-web-gui

info:
  name: Mongo Express Web GUI
  author: puzzlepeaches
  severity: info

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        words:
          - "Set-Cookie: mongo-express="
        part: header
