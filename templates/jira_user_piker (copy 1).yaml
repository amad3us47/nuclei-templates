# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: jira-unauthenticated-user-picker

info:
  name: Jira Unauthenticated User Picker
  author: medbsq
  severity: medium

http:
  - method: GET
    path:
      - "{{BaseURL}}/rest/api/user/picker?query=admin"
    matchers:
      - type: status
        status:
          - 200
