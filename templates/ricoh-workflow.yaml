# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: ricoh-workflow

info:
  name: Ricoh Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Ricoh related nuclei templates on a given target.
workflows:
  - template: http/technologies/favicon-detect.yaml
    matchers:
      - name: ricoh
        subtemplates:
          - tags: ricoh
