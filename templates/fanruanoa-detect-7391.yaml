# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: fanruanoa-detect

info:
  name: FanRuanOA-detect
  author: YanYun
  severity: info
  tags: oa,tech,dotnet,fanruan

http:
  - method: GET

    path:
      - "{{BaseURL}}/WebReport/ReportServer"
      - "{{BaseURL}}/ReportServer"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - 'DeploySuccess._init'
