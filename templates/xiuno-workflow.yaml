# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: xiuno-workflow

info:
  name: Xiuno Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Xiuno related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: xiuno
        subtemplates:
          - tags: xiuno
