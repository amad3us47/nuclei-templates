# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: api-taiga

info:
  name: Taiga API Test
  author: dwisiswant0
  reference: https://docs.taiga.io/api.html
  severity: info
  tags: token-spray,taiga

self-contained: true
http:
  - method: GET
    path:
      - "https://api.taiga.io/api/v1/application-tokens"
    headers:
      Authorization: Bearer {{token}}

    matchers:
      - type: word
        part: body
        words:
          - '"auth_code":'
          - '"state":'
        condition: and
