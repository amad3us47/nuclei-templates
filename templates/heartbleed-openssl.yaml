# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: heartbleed-openssl
info:
  name: Heartbleed OpenSSL Vulnerability
  author: unknown
  severity: high
  description: Detects potential Heartbleed OpenSSL vulnerabilities in the target
author: YourName
tags:
  - web
  - openssl
http:
- method: GET
  path:
    - "/heartbeat"
    - "/vulnerable-endpoint"
  matchers:
  - type: regex
    part: body
    regex:
    - "This server is vulnerable to the Heartbleed OpenSSL bug"
