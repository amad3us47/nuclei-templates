# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: wuzhicms-detect

info:
  name: Wuzhicms Detect
  author: pikpikcu
  severity: info
  tags: tech,wuzhicms

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:

      - type: word
        part: body
        words:
          - "Powered by wuzhicms"

      - type: status
        status:
          - 200
