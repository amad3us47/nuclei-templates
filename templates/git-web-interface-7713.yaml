# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: git-web-interface

info:
  name: Git web interface
  author: dhiyaneshDK
  severity: low
  tags: git
  metadata:
    shodan-query: 'html:"git web interface version"'

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'git web interface version'

      - type: status
        status:
          - 200
