# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: csod-panel

info:
  name: CornerStoneOnDemand Instance Detection Template
  author: righettod
  severity: info
  description: Try to detect the presence of a CornerStoneOnDemand (CSOD www.cornerstoneondemand.com) instance via the login page
  tags: panel,csod

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    redirects: true
    max-redirects: 5
    matchers:
      - type: word
        words:
          - "csod-custom"
          - "csodcommon"
        part: body
        condition: or
