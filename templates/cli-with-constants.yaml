# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: cli-with-constants

info:
  name: Cli Var with Constants
  author: pdteam
  severity: info

constants:
  test: test-in-template

http:
  - method: GET
    path:
      - "{{BaseURL}}?p={{test}}"
    matchers:
      - type: word
        words:
          - "test-in-template"
