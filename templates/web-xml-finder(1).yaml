# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: web-xml-Exposed
info:
  name: Find web.xml found
  author: Clark
  severity: medium
http:
  - method: GET
    path:
      - "{{BaseURL}}/iw-cc/WEB-INF/web.xml"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - contextConfigLocation
        condition: and
      - type: status
        status:
          - 200
