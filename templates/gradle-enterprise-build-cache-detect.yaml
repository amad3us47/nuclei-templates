# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: gradle-enterprise-build-cache-detect

info:
  name: Gradle Enterprise Build Cache Node Detection
  author: Adam Crosser
  severity: info
  tags: panel

http:
  - method: GET
    path:
      - '{{BaseURL}}/'
    redirects: true

    matchers:
      - type: word
        words:
          - '<span>Gradle Enterprise Build Cache Node'
