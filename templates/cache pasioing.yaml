# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: cache-pasioing
id cache-poisoning
info
  name Web Cache Poisoning
  severity medium
  description Detects potential web cache poisoning vulnerabilities in the target
author qaisar afridi
tags
  - web
  - cache-poisoning
requests
- method GET
  path
    - resource
    - cache-me
  matchers
  - type regex
    part headers
    regex
    - Cache-Control public
