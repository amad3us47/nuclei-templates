# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: fastapi-docs

info:
  name: FastAPI Docs
  author: github.com/its0x08
  severity: info
  tags: fastapi,tech,panel

http:
  - method: GET
    path:
      - "{{BaseURL}}/docs"
      - "{{BaseURL}}/redoc"
      - "{{BaseURL}}/openapi.json"

    matchers:
      - type: word
        words:
          - "<title>FastAPI - Swagger UI</title>"
          - "<title>FastAPI - ReDoc</title>"
          - '{"title":"FastAPI"'
        condition: or
