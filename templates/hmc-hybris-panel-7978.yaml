# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: hmc-hybris-panel

info:
  name: SAP Hybris Management Console
  author: dogasantos
  severity: info
  tags: panel,sap

http:
  - method: GET
    path:
      - "{{BaseURL}}/hmc/hybris"
      - "{{BaseURL}}/hybris/hmc/hybris"

    matchers:
      - type: word
        words:
          - "hybris Management Console"
        part: body
