# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: exposed-env-js
info:
  id: exposed-env-js
  name: Exposed env.js File - Detect
  author: OpenAI
  description: Exposed env.js file, which can potentially lead to security vulnerabilities.
  severity: medium
  classification:
    country: any
    tags:
      - security
      - backup
      - exposure

  reference:
    - https://owasp.org/www-project-top-ten/2017/A6_2017-Sensitive_Data_Exposure

  matcher-condition: or

  requests:
    method: GET
    path:
      - "/env.js"
      - "/assets/env.js"
    description: Attempt to access backup directory

  matchers:
    - pattern: "window['env']"
    - pattern: "(function(window) {"
      type: body
      description: Response body indicating the existence of a directory listing

  response:
    - status:
        - 200
