# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: unsecured-jira-panel

info:
  name: Unsecured Jira Dashboard Access
  author: CyberCavalcante
  severity: medium

http:
  - method: GET
    path:
      - "{{BaseURL}}/secure/Dashboard.jspa"

    matchers:
      - type: word
        words:
          - "Atlassian Jira"
          - "Create issue"
          - "Search issues"
          - "Dashboards"
        part: body
