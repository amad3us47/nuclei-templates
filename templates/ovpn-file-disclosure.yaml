# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: ovpn-file-disclosure
info:
  id: ovpn-file-disclosure
  name: OpenVPN Configuration File Exposure - Detect
  author: OpenAI
  description: Template to detect exposed OpenVPN configuration files
  severity: medium
  classification:
    country: any
    tags:
      - openvpn
      - security
      - configuration

matcher-condition: and

http:
    method: GET
    path:
      - "/*.ovpn"
      - "/*.conf"
    description: Attempt to retrieve OpenVPN configuration files
    condition: and

matchers:
  - pattern: "client"
    type: body
    description: OpenVPN configuration file containing client configuration

response:
  - status:
      - 200
    description: Successful response status
