# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: wsdl-api
info:
  name: wsdl-detect
  author: jarijaas
  severity: info
  description: Detects web services that have WSDL (https://www.w3.org/TR/wsdl/)
  tags: exposure,api
http:
  - method: GET
    path:
      - "{{BaseURL}}/?wsdl"
    matchers:
      - type: word
        words:
          - "wsdl:definitions"
