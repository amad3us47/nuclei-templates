# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: jkstatus-manager
info:
  name: JK Status Manager
  author: pdteam
  severity: low
  tags: config,status
http:
  - method: GET
    headers:
      X-Forwarded-For: "127.0.0.1"
    path:
      - "{{BaseURL}}/jkstatus/"
    matchers:
      - type: word
        words:
          - "<title>JK Status Manager</title>"
