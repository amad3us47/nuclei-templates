# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: api-fastly

info:
  name: Fastly API Test
  author: Adam Crosser
  reference: https://developer.fastly.com/reference/api/
  severity: info
  tags: token-spray,fastly

self-contained: true
http:
  - method: GET
    path:
      - "https://api.fastly.com/service"
    headers:
      Fastly-Key: "{{token}}"

    matchers:
      - type: status
        status:
          - 200
