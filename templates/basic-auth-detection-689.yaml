# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: basic-auth-detection

info:
  name: Basic auth detection
  author: w4cky_
  severity: info
  tags: tech,basic-auth

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 401

      - type: word
        words:
          - "Www-Authenticate:"
        part: header
