# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: phpwiki-workflow

info:
  name: phpwiki Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all phpwiki related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: phpwiki
        subtemplates:
          - tags: phpwiki
