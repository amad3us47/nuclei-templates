# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: supervpn-detect
info:
  name: SuperVPN panel detect
  author: organiccrap
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/admin/login.html"
    matchers:
      - type: word
        words:
          - "<title>Sign In-SuperVPN</title>"
        part: body
