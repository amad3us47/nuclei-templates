# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: manageengine-assetexplorer

info:
  name: ZOHO ManageEngine AssetExplorer
  author: dhiyaneshDK
  severity: info
  metadata:
    shodan-query: http.title:"ManageEngine AssetExplorer"
  tags: panel,zoho,manageengine

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>ManageEngine AssetExplorer</title>'

      - type: status
        status:
          - 200
