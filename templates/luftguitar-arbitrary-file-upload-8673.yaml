# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: luftguitar-arbitrary-file-upload
info:
  name: Luftguitar CMS Arbitrary File Upload
  author: pikpikcu
  severity: high
  tags: luftguitar
  reference: https://www.exploit-db.com/exploits/14991
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        GET /ftb.imagegallery.aspx HTTP/1.1
        Host: {{Subdomains}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<title>Insert Image</title>'
          - '<title>Image Gallery</title>'
        condition: or
      - type: status
        status:
          - 200
