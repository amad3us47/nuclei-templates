# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: nagios-status-page

info:
  name: Nagios Current Status Page
  author: dhiyaneshDk
  severity: low
  tags: exposure,nagios
  reference: https://www.exploit-db.com/ghdb/6918

http:
  - method: GET
    path:
      - '{{BaseURL}}/nagios/cgi-bin/status.cgi'
      - '{{BaseURL}}/cgi-bin/nagios4/status.cgi'
      - '{{BaseURL}}/cgi-bin/nagios3/status.cgi'

    matchers:
      - type: word
        words:
          - Current Network Status
