# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: directory-traversal
info:
  name: Directory Traversal
  author: unknown
  severity: medium
  description: Detects potential directory traversal vulnerabilities in the target
author: qaisar afridi
tags:
  - web
  - directory-traversal
http:
- method: GET
  path:
    - "/download"
    - "/file?name=../../etc/passwd"
  matchers:
  - type: regex
    part: body
    regex:
    - "root:.*:0:0:.*"
