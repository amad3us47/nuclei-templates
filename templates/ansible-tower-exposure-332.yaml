# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: ansible-tower-exposure

info:
  name: Ansible Tower Exposure
  author: pdteam
  severity: low
  tags: panel

http:
  - method: GET
    path:
      - '{{BaseURL}}'

    matchers:
      - type: word
        words:
          - "<title>Ansible Tower</title>"
          - "ansible-main-menu"
        condition: and
