# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: django-admin-panel

info:
  name: Python Django Admin Panel
  author: pdteam
  severity: info
  tags: panel,django,python

http:
  - method: GET
    path:
      - "{{BaseURL}}/admin/login/?next=/admin/"
    matchers:
      - type: word
        words:
          - "<a href=\"/admin/\">Django administration</a>"
        condition: and
        part: body
