# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: unauthenticated-prtg
info:
  name: Unauthenticated PRTG Traffic Grapher
  author: dhiyaneshDK
  severity: high
  reference: https://www.exploit-db.com/ghdb/5808
  tags: config,unauth
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        GET /sensorlist.htm HTTP/1.1
        Host: {{Subdomains}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0
        Accept-Encoding: gzip, deflate
        Accept: */*
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'PRTG Traffic Grapher'
        condition: and
      - type: status
        status:
          - 200
