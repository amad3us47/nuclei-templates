# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: api-gitlab

info:
  name: Gitlab API Test
  author: Adam Crosser
  reference: https://docs.gitlab.com/ee/api/personal_access_tokens.html
  severity: info
  tags: token-spray,gitlab

self-contained: true
http:
  - method: GET
    path:
      - "https://gitlab.com/api/v4/personal_access_tokens"
    headers:
      PRIVATE-TOKEN: "{{token}}"

    matchers:
      - type: status
        status:
          - 200
