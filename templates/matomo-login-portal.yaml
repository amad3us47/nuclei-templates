# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: matomo-login-portal

info:
  name: Matomo Login Portal
  author: Arr0way
  severity: info
  description: Matomo provides website analytics
  tags: panel,matomo

http:
  - method: GET
    path:
      - "{{BaseURL}}"
      - "{{BaseURL}}/matomo"

    stop-at-first-match: true
    redirects: true
    max-redirects: 2
    matchers:
      - type: word
        part: body
        words:
          - "Sign in"
          - "Matomo"
        condition: and
