# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: clave-login-panel

info:
  name: Clave login panel
  author: __Fazal
  severity: info
  tags: panel,clave,login

http:
  - method: GET
    path:
      - '{{BaseURL}}/admin.php'

    redirects: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "Clave"
