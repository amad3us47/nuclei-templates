# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: froxlor-detect

info:
  name: Froxlor Detect
  author: pikpikcu
  severity: info
  tags: tech,froxlor

http:
  - method: GET
    path:
      - "{{BaseURL}}/"

    matchers-condition: and
    matchers:

      - type: word
        part: body
        words:
          - "<title>Froxlor Server Management Panel</title>"

      - type: status
        status:
          - 200
