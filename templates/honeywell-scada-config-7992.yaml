# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: honeywell-scada-config

info:
  name: Honeywell Scada System Information Disclosure
  author: alperenkesk
  severity: low
  reference: https://www.exploit-db.com/exploits/44734
  tags: scada,config,exposure

http:
  - method: GET
    path:
      - "{{BaseURL}}/web_caps/webCapsConfig"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "DeviceSubClass"
          - "IPAddress"
        condition: and

      - type: status
        status:
          - 200
