# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: elmah-axd-found-in-partnerportal
info:
  name: Find partnerportal elmah.axd
  author: Clark
  severity: medium
http:
  - method: GET
    path:
      - "{{BaseURL}}/MX/partnerportal/elmah.axd"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - ELMAH
        condition: and
      - type: status
        status:
          - 200
