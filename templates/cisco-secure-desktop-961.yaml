# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: cisco-secure-desktop

info:
  name: Cisco Secure Desktop
  author: pdteam
  severity: info
  tags: cisco,panel

http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100

    raw:
      - |
        GET /CACHE/sdesktop/install/start.htm HTTP/1.1
        Host: {{Subdomains}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "<title>Installation</title>"
          - "WebLaunch"
        part: body
        condition: and

      - type: status
        status:
          - 200
