# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: cloudinary-csp-bypass

info:
  name: Content-Security-Policy Bypass - cloudinary
  author: pussycat0x
  severity: medium
  metadata:
    verified: false
  tags: xss,csp-bypass,cloudinary,vuln

flow: http(1) && headless(1)

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: word
        part: header
        words:
          - "Content-Security-Policy"
          - "cloudinary.com"
        condition: and
        internal: true

headless:
  - steps:
      - action: navigate
        args:

