# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: symfony-debugmode
info:
  name: Symfony Debug Mode
  author: organiccrap,pdteam
  severity: high
  description: A Symfony installations 'debug' interface is enabled, allowing the disclosure and possible execution of arbitrary code.
  reference:
    - https://github.com/synacktiv/eos
  tags: symfony,debug
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers-condition: or
    matchers:
      - type: word
        words:
          - 'X-Debug-Token-Link:'
          - '/_profiler/'
        part: header
        condition: and
      - type: word
        words:
          - 'debug mode</a> is enabled.'
        part: body

