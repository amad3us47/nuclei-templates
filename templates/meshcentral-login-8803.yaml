# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: meshcentral-login
info:
  name: MeshCentral - Login
  author: dhiyaneshDk
  severity: info
  metadata:
    shodan-query: http.title:"MeshCentral - Login"
  tags: panel,meshcentral
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "<title>MeshCentral - Login</title>"
      - type: status
        status:
          - 200
