# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: manageengine-applications-manager

info:
  name: ZOHO ManageEngine Applications Manager
  author: dhiyaneshDK
  severity: info
  tags: panel,zoho,manageengine

http:
  - method: GET
    path:
      - '{{BaseURL}}/index.do'

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Applications Manager Login Screen</title>'

      - type: status
        status:
          - 200
