# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: symfony-database-config
info:
  name: Symfony Database Configuration Exposure
  author: pdteam
  severity: high
  tags: config,exposure
http:
  - method: GET
    path:
      - "{{BaseURL}}/config/databases.yml"
    matchers:
      - type: word
        words:
          - "class:"
          - "param:"
        condition: and
        part: body
