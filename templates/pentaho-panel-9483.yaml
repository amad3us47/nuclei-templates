# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: pentaho-panel
info:
  name: Pentaho Panel
  author: princechaddha,dhiyaneshDK
  severity: info
  metadata:
    shodan-query: pentaho
  tags: panel,pentaho
http:
  - method: GET
    path:
      - '{{BaseURL}}/pentaho/Login'
    matchers:
      - type: word
        words:
          - '<title>Pentaho User Console - Login</title>'
