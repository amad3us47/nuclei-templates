# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: strikingly-takeover

info:
  name: strikingly takeover detection
  author: pdteam
  severity: high
  tags: takeover
  reference: https://medium.com/@sherif0x00/takeover-subdomains-pointing-to-strikingly-5e67df80cdfd

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: word
        words:
          - "But if you're looking to build your own website"
          - "you've come to the right place."
        condition: and
