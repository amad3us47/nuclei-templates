# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sap-hana-xsengine-panel
info:
  name: SAP HANA XSEngine Admin Panel
  author: PR3R00T
  severity: info
  tags: panel
http:
  - method: GET
    path:
      - "{{BaseURL}}/sap/hana/xs/formLogin/login.html"
    redirects: true
    matchers:
      - type: word
        words:
          - "/sap/hana/xs/formLogin/images/sap.png"
        part: body
