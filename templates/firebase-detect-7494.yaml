# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: firebase-detect

info:
  name: firebase detect
  author: organiccrap
  severity: low
  # http://ghostlulz.com/google-exposed-firebase-database/

http:
  - method: GET
    path:
      - "{{BaseURL}}/.settings/rules.json?auth=FIREBASE_SECRET"
    matchers:
      - type: word
        words:
          - "Could not parse auth token"
        part: body
