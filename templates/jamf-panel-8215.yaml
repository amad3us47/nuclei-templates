# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: jamf-panel
info:
  name: JAMF MDM Panel
  author: pdteam,idealphase
  severity: info
  metadata:
    shodan-query: http.favicon.hash:1262005940
  tags: jamf,panel,mdm
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    redirects: true
    max-redirects: 2
    matchers-condition: and
    matchers:
      - type: word
        part: all
        words:
          - "Jamf Pro Login"
          - "Jamf Cloud Node"
        condition: or
    extractors:
      - type: regex
        part: body
        group: 1
        regex:
          - '<meta name=\"version\" content=\"(.*)\">'
