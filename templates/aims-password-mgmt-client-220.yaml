# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: aims-password-mgmt-client

info:
  name: Aims Password Management Client Detect
  author: iamthefrogy
  severity: info
  tags: panel

http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100

    raw:
      - |
        GET /aims/ps/ HTTP/1.1
        Host: {{Subdomains}}
    matchers:
      - type: word
        words:
          - "Avatier Corporation"
