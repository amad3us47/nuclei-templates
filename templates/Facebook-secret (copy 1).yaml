# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: facebook-secret-key

info:
  name: Facebook Secret Key
  author: gaurang
  severity: low

file:
  - extensions:
      - all

    extractors:
      - type: regex
        regex:
          - "(?i)(facebook|fb)(.{0,20})?(?-i)['\"][0-9a-f]{32}['\"]"
