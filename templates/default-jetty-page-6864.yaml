# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: default-jetty-page
info:
  name: Jetty Default Page
  author: dhiyaneshDk
  severity: info
  metadata:
    shodan-query: http.title:"Powered By Jetty"
  tags: tech,jetty
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers:
      - type: word
        words:
          - "<TITLE>Powered By Jetty</TITLE>"
        part: body
