# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: powercreator-workflow

info:
  name: PowerCreator CMS Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all PowerCreator CMS related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: powercreator
        subtemplates:
          - tags: powercreator
