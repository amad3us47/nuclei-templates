# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: error-based-sql-injection

info:
  name: Error based SQL injection [Edit]
  author: geeknik,0xelkot
  severity: high
  description: Detects the possibility of SQL injection in 29 database engines. Inspired by https://github.com/sqlmapproject/sqlmap/blob/master/data/xml/errors.xml.
  tags: sqli,generic,error

http:
  - method: GET
    path:
      - "{{BaseURL}}'"
      - '{{BaseURL}}"'
      - "{{BaseURL}}+"
      - "{{BaseURL}}-"
      - "{{BaseURL}}*"
      - "{{BaseURL}}[]"
      - "{{BaseURL}}')"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Adminer"
        # False Positive
        part: body
