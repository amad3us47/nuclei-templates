# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: yopass-panel
info:
  name: Yopass Application Exposure
  author: Adam Crosser
  severity: info
  tags: panel,yopass
  metadata:
    shodan-query: 'title:"Yopass"'
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    matchers:
      - type: word
        words:
          - "<title>Yopass"
