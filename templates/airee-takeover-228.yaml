# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: airee-takeover

info:
  name: Airee Takeover Detection
  author: pdteam
  severity: high
  reference:
    - https://github.com/EdOverflow/can-i-take-over-xyz
  tags: takeover

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: word
        name: airee
        words:
          - 'Ошибка 402. Сервис Айри.рф не оплачен'
