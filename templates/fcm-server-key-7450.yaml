# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: fcm-server-key
info:
  name: FCM Server Key
  author: absshax
  severity: high
  tags: exposure,token,google
  reference: https://abss.me/posts/fcm-takeover
http:
  - method: GET
    path:
      - "{{BaseURL}}"
    extractors:
      - type: regex
        part: body
        regex:
          - "AAAA[a-zA-Z0-9_-]{7}:[a-zA-Z0-9_-]{140}"
