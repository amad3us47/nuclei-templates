# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: hashicorp-consul-version

info:
  name: Hashicorp Consul Version Detection
  author: c-sh0
  severity: info
  description: Obtain Consul Version Information
  tags: tech,consul,api

http:
  - method: GET
    path:
      - "{{BaseURL}}/v1/agent/self"

    extractors:
      - type: json
        json:
          - " .Config.Version"
