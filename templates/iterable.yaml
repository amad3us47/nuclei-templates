# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: api-iterable

info:
  name: Iterable API Test
  author: zzeitlin
  reference: https://api.iterable.com/api/docs
  severity: info
  tags: token-spray,iterable

http:
  - method: GET
    path:
      - "https://api.iterable.com/api/export/data.json?dataTypeName=emailSend&range=Today&onlyFields=List.empty"
    headers:
      Api_Key: "{{token}}"

    matchers:
      - type: word
        part: body
