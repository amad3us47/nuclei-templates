# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: db-schema-yaml
info:
  name: Discover db schema files
  description: This file is auto-generated from the current state of the database.
  author: geeknik
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/db/schema.rb"
      - "{{BaseURL}}/database/schema.rb"
      - "{{BaseURL}}/schema.rb"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "This file is auto-generated from the current state of the database."
          - "ActiveRecord::Schema.define"
        condition: and
      - type: word
        part: header
        words:
          - "text/html"
