# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: php-ini
info:
  name: php.ini
  author: geeknik
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/php.ini"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "[PHP]"
          - "short_open_tag"
          - "safe_mode"
          - "expose_php"
        condition: and
