# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: calendarix-panel2

info:
  name: Calendarix login detect
  author: r3dg33k
  severity: info
  tags: panel,calendarix


http:
  - raw:
      - |
        GET /calendar/admin/cal_login.php HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - 'Calendarix Admin Login'
