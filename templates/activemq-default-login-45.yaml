# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: activemq-default-login
info:
  name: Apache ActiveMQ Default Credentials
  author: pdteam
  severity: medium
  tags: apache,activemq,default-login
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        GET /admin/ HTTP/1.1
        Host: {{Subdomains}}
        Authorization: Basic YWRtaW46YWRtaW4=
    matchers:
      - type: word
        words:
          - 'Welcome to the Apache ActiveMQ Console of <b>'
          - '<h2>Broker</h2>'
        condition: and
