# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: yzmcms-detect
info:
  name: YzmCMS Detect
  author: pikpikcu
  severity: info
  tags: yzmcms,tech
http:
  - method: GET
    path:
      - '{{BaseURL}}/admin/index/login.html'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - 'Powered By <a href="http://www.yzmcms.com"'
