# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: apc-ups-login

info:
  name: APC UPS Login
  author: droberson
  severity: info
  reference:
    - https://www.shodan.io/search?query=title%3A%22APC+%7C+Log+On%22
  tags: iot,panel

http:
  - method: GET
    path:
      - "{{BaseURL}}/logon.htm"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>APC | Log On</title>'
        part: body

      - type: status
        status:
          - 200
