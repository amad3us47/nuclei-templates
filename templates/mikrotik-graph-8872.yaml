# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: mikrotik-graph
info:
  name: Mikrotik Router Graphing
  author: dhiyaneshDK
  severity: low
  reference: https://www.exploit-db.com/ghdb/4395
  tags: unauth
http:
  - payloads:
      Subdomains: /home/mahmoud/Wordlist/AllSubdomains.txt

    threads: 100
    raw:
      - |
        GET /graphs/ HTTP/1.1
        Host: {{Subdomains}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; rv:68.0) Gecko/20100101 Firefox/68.0
        Accept-Encoding: gzip, deflate
        Accept: */*
    matchers-condition: and
    matchers:
      - type: word
        words:
          - 'Traffic and system resource graphing'
        condition: and
      - type: status
        status:
          - 200
