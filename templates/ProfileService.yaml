# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: Find-ProfileService
info:
  name: Find WSLD Profile Service exposed
  author: Clark
  severity: medium

http:
  - method: GET
    path:
      - "{{BaseURL}}/services/profileService"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - soapenv
        condition: and

      - type: status
        status:
          - 200
