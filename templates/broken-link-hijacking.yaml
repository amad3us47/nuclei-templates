# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: broken-link-hijacking
info:
  name: Broken Link Hijacking
  author: unknown
  severity: medium
  description: Detects potential broken link hijacking vulnerabilities in the target
author: qaisar afridi
tags:
  - web
  - broken-link
http:
- method: GET
  path:
    - "/link"
    - "/hijack?redirect=http://malicious.com"
  matchers:
  - type: regex
    part: body
    regex:
    - "window\\.location\\.href.*=.*malicious\\.com"
