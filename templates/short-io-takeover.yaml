# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: short-io-takeover

info:
  name: Short.io takeover detection
  author: philippedelteil
  severity: high
  tags: takeover,short.io
  reference: https://github.com/EdOverflow/can-i-take-over-xyz/issues/260

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        words:
          - "Link does not exist"
          - "This domain is not configured on Short.io"
        condition: and
