# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: api-pagerduty

info:
  name: Pagerduty API Test
  author: zzeitlin
  reference: https://developer.pagerduty.com/api-reference
  severity: info
  tags: token-spray,pagerduty

http:
  - method: GET
    path:
      - "https://api.pagerduty.com/schedules"
    headers:
      Accept: application/vnd.pagerduty+json;version=2
      Authorization: Token token={{token}}

    matchers:
      - type: status
        status:
          - 401
