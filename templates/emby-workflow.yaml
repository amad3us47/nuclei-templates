# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: emby-workflow

info:
  name: Emby Server Security Checks
  author: daffainfo
  severity: info
  description: A simple workflow that runs all Emby Server related nuclei templates on a given target.
workflows:
  - template: http/technologies/fingerprinthub-web-fingerprints.yaml
    matchers:
      - name: emby
        subtemplates:
          - tags: emby
