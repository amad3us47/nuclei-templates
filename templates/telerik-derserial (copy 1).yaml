# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: telerik-deserial

info:
  name: Telerik Deserialization
  author: notnotnotveg
  severity: info

http:
  - method: GET
    path:
      - "{{BaseURL}}/Telerik.Web.UI.DialogHandler.aspx"
    matchers:
      - type: word
        words:
          - "Loading the dialog"
        part: body
