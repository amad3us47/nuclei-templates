# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: jupyter-ipython-unauth
info:
  name: Jupyter ipython Unauth
  author: pentest_swissky
  severity: critical
  description: Unauthenticated access to Jupyter instance
  tags: unauth
http:
  - method: GET
    path:
      - "{{BaseURL}}/ipython/tree"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - ipython/static/components
          - ipython/kernelspecs
        part: body
