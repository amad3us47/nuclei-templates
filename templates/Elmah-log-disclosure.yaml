# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: Elmah-Log-Disclosure

info:
  name: Elmah Log Disclosure
  author: Excis3
  severity: critical
  description: Unauthenticated exposure of logs.
  tags: log

http:
  - method: GET
    path:
      - "{{BaseURL}}/elmah.axd"

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "Error log for"

      - type: status
        status:
          - 200
