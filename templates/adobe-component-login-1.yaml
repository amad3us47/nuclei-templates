# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: adobe-component-login1

info:
  name: Adobe Component Brower Login
  author: dhiyaneshDK
  severity: info
  reference: https://www.exploit-db.com/ghdb/6846
  tags: panel


http:
  - raw:
      - |
        GET /cfide/componentutils/login.cfm HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        words:
          - '<title>Component Browser Login</title>'
      - type: status
        status:
          - 200
