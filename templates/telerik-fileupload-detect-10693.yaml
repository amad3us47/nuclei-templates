# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: telerik-fileupload-detect
info:
  name: Detect Telerik Web UI fileupload handler
  author: organiccrap
  severity: info
  tags: tech,telerik,fileupload
http:
  - method: GET
    path:
      - "{{BaseURL}}/Telerik.Web.UI.WebResource.axd?type=rau"
    matchers:
      - type: word
        words:
          - "RadAsyncUpload handler is registered succesfully"
