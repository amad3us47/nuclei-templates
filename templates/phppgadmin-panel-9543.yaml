# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: phppgadmin-panel

info:
  name: phpPgAdmin Panel
  author: Ganofins
  severity: info
  tags: panel,phppgadmin

http:
  - method: GET
    path:
      - "{{BaseURL}}/phppgadmin/"
    matchers:
      - type: word
        words:
          - "phpPgAdmin"
          - "browser.php"
          - "intro.php"
        condition: and
