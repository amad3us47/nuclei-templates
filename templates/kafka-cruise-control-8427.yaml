# yaml-language-server: $schema=https://raw.githubusercontent.com/projectdiscovery/nuclei/dev/pkg/templates/nuclei-jsonschema.json
id: kafka-cruise-control
info:
  name: Kafka Cruise Control UI
  author: dhiyaneshDK
  severity: medium
  metadata:
    shodan-query: http.title:"Kafka Cruise Control UI"
  tags: kafka,misconfig
http:
  - method: GET
    path:
      - '{{BaseURL}}'
    redirects: true
    max-redirects: 2
    matchers:
